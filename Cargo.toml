[package]
name = "mntrs"
version = "0.1.0"
edition = "2024"
description = "Mount remote storage (S3, HDFS, GCS, etc.) to local directory via FUSE"

[dependencies]
fuser = { version = "0.15", features = ["abi-7-28"] }
opendal = { version = "0.57", features = ["services-s3", "services-gcs", "services-azblob", "services-hdfs-native"] }
clap = { version = "4.5", features = ["derive"] }
tokio = { version = "1", features = ["full", "rt-multi-thread"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
url = "2"
libc = "0.2"
futures = "0.3"
once_cell = "1"

[workspace]
members = ["."]

[[bin]]
name = "mntrs"
path = "src/main.rs"
