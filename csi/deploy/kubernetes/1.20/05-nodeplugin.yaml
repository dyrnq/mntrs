kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: csi-nodeplugin-mntrs
  namespace: csi-mntrs
spec:
  selector:
    matchLabels:
      app: csi-nodeplugin-mntrs
  template:
    metadata:
      labels:
        app: csi-nodeplugin-mntrs
    spec:
      serviceAccountName: csi-nodeplugin-mntrs
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: node-driver-registrar
          image: dyrnq/csi-node-driver-registrar:v2.9.4
          # NOTE: preStop hook removed. The previous
          #   preStop.exec: /bin/sh -c "rm -rf /registration/csi-mntrs ..."
          # ran on a distroless image (no /bin/sh), failed silently, and
          # forced kubelet to fall back to its full 30s terminationGracePeriod
          # before csi.sock was actually released — which in turn meant the
          # 13× `MountVolume.MountDevice failed ... use of closed network
          # connection` errors on the dynamic test pod (the mount RPC landed
          # while kubelet was still draining the registrar). Kubelet cleans
          # up the /registration/csi-mntrs* files on its own when the pod
          # is removed, so removing the hook is safe.
          args:
            - --v=1
            - --csi-address=/plugin/csi.sock
            - --kubelet-registration-path=/var/lib/kubelet/plugins/csi-mntrs/csi.sock
            - --http-endpoint=:9810
          env:
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          # httpGet probe: csi-node-driver-registrar v2.4.0's --http-endpoint
          # serves a /healthz that 200s when the registration socket is
          # reachable. Replaces the old /bin/sh exec probe that 100% failed
          # on this distroless image.
          ports:
            - name: hz-registrar
              containerPort: 9810
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: hz-registrar
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          volumeMounts:
            - name: plugin-dir
              mountPath: /plugin
            - name: registration-dir
              mountPath: /registration
        - name: mntrs
          securityContext:
            privileged: true
            capabilities:
              add: ["SYS_ADMIN"]
            allowPrivilegeEscalation: true
          image: csi-mntrs:latest
          args:
            - "--node-id=$(NODE_ID)"
            - "--endpoint=$(CSI_ENDPOINT)"
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CSI_ENDPOINT
              value: unix://plugin/csi.sock
            # Issue #234 (痛点 1): CSI mode writes the FUSE
            # cache under $MNTRS_CACHE_DIR/<volume_id>. Pre-fix
            # this was unset → csi-mntrs fell back to
            # /tmp/mntrs-csi-cache/<mountpoint>/, which on a
            # daemonset meant all PVCs across all pods on the
            # node shared one directory (no per-PVC isolation,
            # tmpfs pressure, lost on node reboot). The
            # hostPath-backed /var/lib/mntrs-cache gives each
            # node a stable cache root that survives pod
            # reschedule (痛点 3 partial) and stays out of the
            # container rootfs. Opt-in: existing deployments
            # without this env var still work — csi-mntrs
            # (csi/mntrs-csi/src/main.rs:474) only switches
            # cache_dir if MNTRS_CACHE_DIR is set.
            - name: MNTRS_CACHE_DIR
              value: /var/lib/mntrs-cache
          imagePullPolicy: Always
          # exec /bin/sh probe is OK here: the mntrs image is alpine:3.21 +
          # fuse3-libs, which has /bin/sh. The probe is a weak "socket file
          # exists" check (not gRPC Identity.Probe) — that's a known
          # limitation; promoting it to a real gRPC probe would need a
          # tiny client binary, out of scope here.
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "ls /plugin/csi.sock > /dev/null 2>&1 || exit 1"
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: plugin-dir
              mountPath: /plugin
            - name: pods-mount-dir
              mountPath: /var/lib/kubelet/pods
              mountPropagation: Bidirectional
            - name: cache-dir
              mountPath: /var/lib/mntrs-cache
      volumes:
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/csi-mntrs
            type: DirectoryOrCreate
        - name: pods-mount-dir
          hostPath:
            path: /var/lib/kubelet/pods
            type: Directory
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: DirectoryOrCreate
        - name: cache-dir
          hostPath:
            path: /var/lib/mntrs-cache
            type: DirectoryOrCreate
