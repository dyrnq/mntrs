apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-nodeplugin-mntrs
  namespace: csi-mntrs
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: csi-nodeplugin-mntrs
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: [""]
    resources: ["secrets", "secret"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: csi-nodeplugin-mntrs
subjects:
  - kind: ServiceAccount
    name: csi-nodeplugin-mntrs
    namespace: csi-mntrs
roleRef:
  kind: ClusterRole
  name: csi-nodeplugin-mntrs
  apiGroup: rbac.authorization.k8s.io
