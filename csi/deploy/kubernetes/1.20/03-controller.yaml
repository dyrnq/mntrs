kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: csi-controller-mntrs
  namespace: csi-mntrs
spec:
  serviceName: csi-controller-mntrs
  replicas: 1
  selector:
    matchLabels:
      app: csi-controller-mntrs
  template:
    metadata:
      labels:
        app: csi-controller-mntrs
    spec:
      serviceAccountName: csi-controller-mntrs
      containers:
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v5.0.2
          args:
            - "--csi-address=$(ADDRESS)"
            - "--extra-create-metadata"
            - "--http-endpoint=:9808"
            - "--v=1"
          env:
            - name: ADDRESS
              value: /plugin/csi.sock
          imagePullPolicy: Always
          # httpGet probe: csi-provisioner's --http-endpoint serves a /healthz
          # that 200s when the provisioner can reach csi.sock. Replaces the
          # old `exec: /bin/sh -c "ls /plugin/csi.sock ..."` probe, which
          # 100% failed because csi-provisioner v5.0.2 is
          # gcr.io/distroless/static:latest (no /bin/sh) and triggered a
          # failureThreshold×periodSeconds restart loop that tore csi.sock
          # down mid-mount.
          ports:
            - name: healthz
              containerPort: 9808
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          volumeMounts:
            - name: socket-dir
              mountPath: /plugin
        - name: csi-attacher
          image: k8s.gcr.io/sig-storage/csi-attacher:v3.4.0
          args:
            - "--csi-address=$(ADDRESS)"
            - "--http-endpoint=:9809"
            - "--v=1"
          env:
            - name: ADDRESS
              value: /plugin/csi.sock
          imagePullPolicy: Always
          # see livenessProbe note on csi-provisioner above
          ports:
            - name: healthz
              containerPort: 9809
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          volumeMounts:
            - name: socket-dir
              mountPath: /plugin
        - name: mntrs
          image: csi-mntrs:latest
          args:
            - "--node-id=$(NODE_ID)"
            - "--endpoint=$(CSI_ENDPOINT)"
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CSI_ENDPOINT
              value: unix://plugin/csi.sock
          imagePullPolicy: Always
          securityContext:
            privileged: true
            capabilities:
              add: ["SYS_ADMIN"]
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: socket-dir
              mountPath: /plugin
      volumes:
        - name: socket-dir
          emptyDir: {}
