name: Integration Tests

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

jobs:
  build-hdfs-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      image: ghcr.io/${{ github.repository_owner }}/mntrs-hdfs:ci-test-${{ github.sha }}
    env:
      # Kerberos principal hostname baked into the image. The
      # hdfs-kerberos job must run the container with
      # `--hostname ${HDFS_HOSTNAME}` for SASL auth to work — see
      # that job for details.
      HDFS_HOSTNAME: hdfs.test
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push HDFS image
        uses: docker/build-push-action@v6
        with:
          context: docker/hdfs
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mntrs-hdfs:ci-test-${{ github.sha }}
          build-args: |
            HDFS_HOSTNAME=${{ env.HDFS_HOSTNAME }}

  mount-tests:
    needs: build-hdfs-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: memory
            storage: memory://
          - name: s3
            storage: s3://test-bucket
          - name: hdfs
            storage: hdfs://localhost:8020/

    services:
      minio:
        image: minio/minio:latest
        command: server /data
        options: --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1" --health-interval 5s
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev fuse3 protobuf-compiler
          sudo grep -q '^user_allow_other' /etc/fuse.conf || echo 'user_allow_other' | sudo tee -a /etc/fuse.conf

      - name: Build mntrs
        run: cargo build --release -p mntrs

      # ---- S3 backend: create bucket + upload test file ----
      - name: Setup MinIO (S3 only)
        if: matrix.backend.name == 's3'
        run: |
          pip3 install awscli
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin             aws --endpoint-url http://localhost:9000 --no-verify-ssl s3 mb s3://test-bucket 2>/dev/null || true
          echo "hello s3" > /tmp/s3-test.txt
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin             aws --endpoint-url http://localhost:9000 --no-verify-ssl s3 cp /tmp/s3-test.txt s3://test-bucket/

      # ---- HDFS backend: start container in simple auth mode ----
      - name: Setup HDFS (HDFS only)
        if: matrix.backend.name == 'hdfs'
        run: |
          # Configure HDFS as single-node HA nameservice cluster.
          # OpenDAL hdfs-native backend uses hdfs://nameservice internally,
          # so the NameNode must register under the nameservice name.
          cat > /tmp/core-site-simple.xml << 'XML'
          <configuration>
            <property><name>fs.defaultFS</name><value>hdfs://nameservice</value></property>
            <property><name>hadoop.security.authentication</name><value>simple</value></property>
            <property><name>hadoop.security.authorization</name><value>false</value></property>
          </configuration>
          XML
          cat > /tmp/hdfs-site-simple.xml << 'XML'
          <configuration>
            <property><name>dfs.replication</name><value>1</value></property>
            <property><name>dfs.permissions.enabled</name><value>false</value></property>
            <property><name>dfs.nameservices</name><value>nameservice</value></property>
            <property><name>dfs.ha.namenodes.nameservice</name><value>nn0</value></property>
            <property><name>dfs.namenode.rpc-address.nameservice.nn0</name><value>0.0.0.0:8020</value></property>
            <property><name>dfs.namenode.http-address.nameservice.nn0</name><value>0.0.0.0:9870</value></property>
            <property><name>dfs.client.failover.proxy.provider.nameservice</name><value>org.apache.hadoop.hdfs.server.namenode.ha.ConfiguredFailoverProxyProvider</value></property>
            <property><name>dfs.datanode.address</name><value>0.0.0.0:9866</value></property>
            <property><name>dfs.datanode.http.address</name><value>0.0.0.0:9864</value></property>
          </configuration>
          XML
          docker run -d --name hdfs \
            --add-host nameservice:127.0.0.1 \
            -p 8020:8020 -p 9866:9866 -p 9864:9864 \
            -v /tmp/core-site-simple.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro \
            -v /tmp/hdfs-site-simple.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro \
            ghcr.io/dyrnq/mntrs-hdfs:ci-test-${{ github.sha }}

          # Wait for NameNode + DataNode
          for i in $(seq 1 20); do
            echo "  attempt $i..."
            if docker exec -u mntrs hdfs /opt/hadoop/bin/hdfs dfsadmin -report >/dev/null 2>&1; then
              echo "HDFS ready"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "::error::HDFS not ready after 20 attempts"
              docker exec -u mntrs hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1 || true
              docker logs hdfs 2>&1 | tail -20
              exit 1
            fi
            sleep 5
          done
          docker logs hdfs 2>&1 | tail -5
          docker exec -u mntrs hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1 | head -10
          docker exec -u mntrs hdfs /opt/hadoop/bin/hdfs dfs -mkdir -p /test
          echo "hello hdfs" | docker exec -i -u mntrs hdfs /opt/hadoop/bin/hdfs dfs -put - /test/hello.txt

      # ---- Mount + read/write test ----
      - name: Test mount
        run: |
          sudo mkdir -p /mnt/mntrs-test && sudo chmod 777 /mnt/mntrs-test
          MOUNT_OPTS="--opt endpoint=http://localhost:9000 --opt access-key=minioadmin --opt secret-key=minioadmin --opt region=us-east-1"
          # hdfs backend uses --daemon --daemon-wait (parent exits after spawn); other backends run in foreground
          # Per SESSION_PITFALLS §2.2: --daemon re-execs, $! is unreliable — use mount table only
          # Per SESSION_PITFALLS §2.4: hdfs-native can return root entry / trailing slashes; ls may EIO briefly
          MOUNT_LOG="/tmp/mntrs-mount-${{ matrix.backend.name }}.log"
          if [ "${{ matrix.backend.name }}" = "hdfs" ]; then
            # MNTRS_DAEMON_LOG redirects daemon child's stdout/stderr to the
            # MOUNT_LOG file (the > $MOUNT_LOG 2>&1 above only captures the
            # parent, which exits immediately after spawning the daemon —
            # see SESSION_PITFALLS §2.2). Without this, daemon's tracing
            # output goes to /dev/null and the artifact is empty.
            MNTRS_DAEMON_LOG="$MOUNT_LOG" \
              ./target/release/mntrs mount ${{ matrix.backend.storage }} /mnt/mntrs-test $MOUNT_OPTS --allow-other --daemon --daemon-wait --daemon-timeout=20 > "$MOUNT_LOG" 2>&1 &
          else
            ./target/release/mntrs mount ${{ matrix.backend.storage }} /mnt/mntrs-test $MOUNT_OPTS > "$MOUNT_LOG" 2>&1 &
          fi

          # Readiness probe: wait up to 60s for mount + ls to both succeed
          # HDFS containers take 30-60s to fully boot; mem/s3 are sub-second
          FAIL=0
          READY=0
          for i in $(seq 1 60); do
            if mount | grep -q /mnt/mntrs-test; then
              # ls may transiently EIO on hdfs while NameNode finishes startup
              if ls /mnt/mntrs-test/ >/dev/null 2>&1; then
                echo "mount ready after ${i}s"
                READY=1
                break
              fi
            fi
            sleep 1
          done

          if [ $READY -eq 0 ]; then
            echo "::error::${{ matrix.backend.name }} mount not ready after 60s"
            echo "--- mount log ---"
            cat "$MOUNT_LOG" 2>/dev/null || true
            echo "--- mount table ---"
            mount | grep mntrs-test || echo "(no mount)"
            echo "--- mntrs processes ---"
            pgrep -alf mntrs || echo "(no mntrs process)"
            if [ "${{ matrix.backend.name }}" = "hdfs" ]; then
              echo "--- HDFS dfsadmin -report (server side) ---"
              docker exec -u mntrs hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1 | tee /tmp/hdfs-dfsadmin-report.txt | head -30 || true
            fi
            echo "--- fusermount might be needed ---"
            exit 1
          fi

          # Per SESSION_PITFALLS §2.6: CI green ≠ tests pass — track failures explicitly
          if mount | grep -q /mnt/mntrs-test; then
            echo "--- 1. ls ---"
            ls -laR /mnt/mntrs-test/ 2>&1

            echo "--- 2. cat pre-existing files ---"
            case "${{ matrix.backend.name }}" in
              s3)
                EXPECTED="hello s3"
                GOT=$(cat /mnt/mntrs-test/s3-test.txt 2>/dev/null)
                if [ "$GOT" = "$EXPECTED" ]; then
                  echo "read pre-existing OK: s3-test.txt"
                else
                  echo "::error::read pre-existing FAIL: s3-test.txt (got '$GOT')"
                  FAIL=1
                fi
                ;;
              hdfs)
                EXPECTED="hello hdfs"
                GOT=$(cat /mnt/mntrs-test/test/hello.txt 2>/dev/null)
                if [ "$GOT" = "$EXPECTED" ]; then
                  echo "read pre-existing OK: test/hello.txt"
                else
                  echo "::error::read pre-existing FAIL: test/hello.txt (got '$GOT')"
                  FAIL=1
                fi
                ;;
            esac

            echo "--- 3. write small file ---"
            echo "hello from ${{ matrix.backend.name }}" > /mnt/mntrs-test/_ci_small.txt 2>/dev/null && echo "write OK" || { echo "write FAIL"; FAIL=1; }

            echo "--- 4. read back written file ---"
            GOT=$(cat /mnt/mntrs-test/_ci_small.txt 2>/dev/null)
            if [ "$GOT" = "hello from ${{ matrix.backend.name }}" ]; then
              echo "read back OK"
            else
              echo "(write skipped: readonly - file not expected)"
            fi

            echo "--- 5. append write ---"
            echo "more data" >> /mnt/mntrs-test/_ci_small.txt 2>/dev/null && echo "append OK" || echo "(append skipped: readonly)"

            echo "--- 6. write+read 10M sequential ---"
            dd if=/dev/urandom of=/mnt/mntrs-test/_ci_10m.bin bs=1M count=10 2>/dev/null && echo "write 10M OK" || { echo "write 10M FAIL"; FAIL=1; }
            dd if=/mnt/mntrs-test/_ci_10m.bin of=/dev/null bs=64K 2>/dev/null && echo "read 10M OK" || echo "(10M read skipped: readonly)"

            echo "--- 7. random read 10M ---"
            for off in 0 500 10000 50000 500000 5000000 9000000 9999999; do
              dd if=/mnt/mntrs-test/_ci_10m.bin bs=1 count=1 skip=$off of=/dev/null 2>/dev/null && echo "  seek $off OK" || { echo "  seek $off FAIL"; FAIL=1; }
            done

            echo "--- 8. cleanup ---"
            rm -f /mnt/mntrs-test/_ci_small.txt /mnt/mntrs-test/_ci_10m.bin 2>/dev/null || true

            if [ $FAIL -eq 0 ]; then
              echo "✅ ${{ matrix.backend.name }} mount OK"
            else
              echo "::error::${{ matrix.backend.name }} mount tests FAILED"
              exit 1
            fi
          else
            echo "::error::${{ matrix.backend.name }} mount failed: not in mount table"
            mount | grep mntrs || true
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          if mount | grep -q /mnt/mntrs-test; then
            sudo fusermount3 -u /mnt/mntrs-test
          fi
          docker rm -f hdfs 2>/dev/null || true

      # Per SESSION_PITFALLS §2.6: CI green ≠ tests pass; on failure, preserve
      # the mount log and HDFS dfsadmin report for post-mortem. Pattern adapted
      # from bench.yml ("Upload rclone log" + "actions/upload-artifact@v4").
      - name: Upload mount log (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mount-log-${{ matrix.backend.name }}
          path: /tmp/mntrs-mount-${{ matrix.backend.name }}.log
          if-no-files-found: warn

      - name: Upload HDFS dfsadmin report (failure, hdfs only)
        if: failure() && matrix.backend.name == 'hdfs'
        uses: actions/upload-artifact@v4
        with:
          name: hdfs-dfsadmin-report
          path: /tmp/hdfs-dfsadmin-report.txt
          if-no-files-found: warn


  hdfs-kerberos:
    needs: build-hdfs-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y krb5-user libfuse3-dev fuse3
          sudo grep -q '^user_allow_other' /etc/fuse.conf || echo 'user_allow_other' | sudo tee -a /etc/fuse.conf

      - name: Start HDFS container
        env:
          # MUST match the HDFS_HOSTNAME build-arg used in
          # build-hdfs-image, otherwise the kerberos principal baked
          # into the keytab won't match the runtime hostname and SASL
          # auth will fail with 'Connection reset by peer'.
          HDFS_HOSTNAME: hdfs.test
        run: |
          # Generate HA+Kerberos config. hdfs-native (OpenDAL) hardcodes
          # hdfs://nameservice internally; the container must run in HA
          # nameservice mode or the RPC protocol won't match and the client
          # gets 'Connection reset by peer' (SESSION_PITFALLS §2.1).
          cat > /tmp/core-site-ha-krb.xml << 'XML'
          <configuration>
            <property><name>fs.defaultFS</name><value>hdfs://nameservice</value></property>
            <property><name>hadoop.security.authentication</name><value>kerberos</value></property>
            <property><name>hadoop.security.authorization</name><value>true</value></property>
            <property><name>hadoop.rpc.protection</name><value>authentication</value></property>
          </configuration>
          XML
          cat > /tmp/hdfs-site-ha-krb.xml << 'XML'
          <configuration>
            <property><name>dfs.replication</name><value>1</value></property>
            <property><name>dfs.permissions.enabled</name><value>false</value></property>
            <property><name>dfs.nameservices</name><value>nameservice</value></property>
            <property><name>dfs.ha.namenodes.nameservice</name><value>nn0</value></property>
            <property><name>dfs.namenode.rpc-address.nameservice.nn0</name><value>0.0.0.0:8020</value></property>
            <property><name>dfs.namenode.http-address.nameservice.nn0</name><value>0.0.0.0:9870</value></property>
            <property><name>dfs.client.failover.proxy.provider.nameservice</name><value>org.apache.hadoop.hdfs.server.namenode.ha.ConfiguredFailoverProxyProvider</value></property>
            <property><name>dfs.namenode.kerberos.principal</name><value>hdfs/hdfs.test@TEST.LOCAL</value></property>
            <property><name>dfs.namenode.keytab.file</name><value>/tmp/hdfs.keytab</value></property>
            <property><name>dfs.datanode.kerberos.principal</name><value>hdfs/hdfs.test@TEST.LOCAL</value></property>
            <property><name>dfs.datanode.keytab.file</name><value>/tmp/hdfs.keytab</value></property>
            <property><name>dfs.web.authentication.kerberos.principal</name><value>HTTP/hdfs.test@TEST.LOCAL</value></property>
            <property><name>dfs.web.authentication.kerberos.keytab</name><value>/tmp/hdfs.keytab</value></property>
            <property><name>dfs.block.access.token.enable</name><value>true</value></property>
            <property><name>dfs.data.transfer.protection</name><value>authentication</value></property>
            <property><name>dfs.http.policy</name><value>HTTP_ONLY</value></property>
            <property><name>dfs.datanode.address</name><value>0.0.0.0:9866</value></property>
            <property><name>dfs.datanode.http.address</name><value>0.0.0.0:9864</value></property>
            <property><name>ignore.secure.ports.for.testing</name><value>true</value></property>
            <property><name>dfs.namenode.secondary.http-address</name><value>0.0.0.0:0</value></property>
          </configuration>
          XML
          set -x
          docker run -d --name hdfs --hostname "$HDFS_HOSTNAME" \
            --add-host nameservice:127.0.0.1 \
            -p 8020:8020 -p 88:88 -p 749:749 \
            -v /tmp/core-site-ha-krb.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro \
            -v /tmp/hdfs-site-ha-krb.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro \
            ${{ needs.build-hdfs-image.outputs.image }}
          HDFS_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' hdfs)
          echo "HDFS container hostname: $(docker exec hdfs hostname)"
          echo "HDFS container IP: $HDFS_IP"

          echo "=== Wait for KDC port 88 ==="
          for i in $(seq 1 30); do
            echo "  kdc attempt $i..."
            if docker exec hdfs bash -c 'echo > /dev/tcp/127.0.0.1/88' 2>/dev/null; then
              echo "KDC port 88 up after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::KDC port 88 never came up"
              docker logs hdfs 2>&1 | tail -40
              exit 1
            fi
            sleep 2
          done

          echo "=== Wait for NameNode + DataNode (kinit retry inside loop) ==="
          # s6-overlay starts krb5kdc, kadmin, namenode, datanode concurrently.
          # Even after KDC port 88 is open, the kadmin realm can take a few
          # more seconds to bootstrap, and the first kinit may race the
          # kadmind startup. Retry kinit until it succeeds, then poll
          # dfsadmin for the live datanode.
          # kinit must run as the same user (mntrs) that the subsequent
          # hdfs dfsadmin runs as — ticket caches are per-uid, and
          # hdfs.keytab must be readable by mntrs (chmod 644 in the image
          # already handles that). Running kinit as root would put
          # the ticket in /tmp/krb5cc_0 which mntrs can't see.
          KINITED=0
          for i in $(seq 1 20); do
            echo "  attempt $i..."
            if docker exec -u mntrs hdfs /usr/bin/kinit -kt /tmp/hdfs.keytab hdfs/${HDFS_HOSTNAME}@TEST.LOCAL 2>/dev/null; then
              KINITED=1
            fi
            if [ $KINITED -eq 1 ] \
               && docker exec -u mntrs hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1 | grep -q "Live datanodes"; then
              echo "HDFS ready (kinit took attempt $i)"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "::error::HDFS did not become ready after 20 attempts (kinit_ok=$KINITED)"
              docker exec -u mntrs hdfs /usr/bin/kinit -kt /tmp/hdfs.keytab hdfs/${HDFS_HOSTNAME}@TEST.LOCAL 2>&1
              docker exec hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1
              docker logs hdfs 2>&1 | tail -30
              exit 1
            fi
            sleep 5
          done

          echo "=== Container status ==="
          docker logs hdfs 2>&1 | tail -10
          docker exec hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1 | head -10

          echo "=== Extracting Kerberos config ==="
          docker cp hdfs:/tmp/testuser.keytab /tmp/testuser.keytab
          docker cp hdfs:/tmp/hdfs.keytab /tmp/hdfs.keytab
          docker cp hdfs:/etc/krb5.conf /tmp/krb5.conf
          # Add both the kdc alias and the hdfs hostname to the host's
          # /etc/hosts. The kdc alias points to the container's IP
          # (where the KDC service is reachable); the hdfs hostname
          # must point to 127.0.0.1 because docker's port forward
          # exposes the container's 8020 on the host's loopback. If we
          # pointed hdfs.test at the container IP, the hdfs client
          # would try a direct TCP connection bypassing the port
          # forward, which the container's iptables rules don't accept.
          echo "${HDFS_IP} kdc" | sudo tee -a /etc/hosts
          echo "127.0.0.1 hdfs.test" | sudo tee -a /etc/hosts
          echo "127.0.0.1 nameservice" | sudo tee -a /etc/hosts
          docker cp hdfs:/opt/hadoop/etc/hadoop/core-site.xml /tmp/core-site.xml
          docker cp hdfs:/opt/hadoop/etc/hadoop/hdfs-site.xml /tmp/hdfs-site.xml

      - name: Configure Kerberos
        env:
          HDFS_HOSTNAME: hdfs.test
        run: |
          sudo cp /tmp/krb5.conf /etc/krb5.conf
          # Per SESSION_PITFALLS §2.4: hdfs-native uses libhdfs which goes
          # through GSSAPI. testuser's ticket can't always negotiate with
          # the hdfs service principal on every hdfs image config — at the
          # SASL layer we got 'Connection reset by peer' (os error 104).
          # The hdfs image's superuser is hdfs/${HDFS_HOSTNAME}; using
          # the hdfs.keytab for the host's kinit guarantees the client
          # principal matches what the RPC handler expects, which is
          # what this test is verifying (kerberos auth roundtrip, not
          # non-superuser ACL semantics).
          kinit -kt /tmp/hdfs.keytab hdfs/${HDFS_HOSTNAME}@TEST.LOCAL
          klist

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Test HDFS Kerberos mount
        env:
          HDFS_HOSTNAME: hdfs.test
        run: |
          set -x
          echo "=== 1. Renew Kerberos ticket (hdfs principal) ==="
          kinit -kt /tmp/hdfs.keytab hdfs/${HDFS_HOSTNAME}@TEST.LOCAL
          klist

          echo "=== 2. Create test data in HDFS ==="
          docker exec -u mntrs hdfs /usr/bin/kinit -kt /tmp/hdfs.keytab hdfs/${HDFS_HOSTNAME}@TEST.LOCAL
          docker exec -u mntrs hdfs /opt/hadoop/bin/hdfs dfs -mkdir -p /test
          docker exec -u mntrs hdfs /opt/hadoop/bin/hdfs dfs -chmod 777 /test
          echo "hello kerberos hdfs" | docker exec -i -u mntrs hdfs /opt/hadoop/bin/hdfs dfs -put - /test/hello.txt
          docker exec -u mntrs hdfs /opt/hadoop/bin/hdfs dfs -chmod 644 /test/hello.txt
          docker exec -u mntrs hdfs /opt/hadoop/bin/hdfs dfs -ls /test/

          echo "=== 3. Export Hadoop config for OpenDAL native HDFS backend ==="
          mkdir -p /tmp/hadoop-conf
          cp /tmp/core-site.xml /tmp/hadoop-conf/
          cp /tmp/hdfs-site.xml /tmp/hadoop-conf/
          export HADOOP_CONF_DIR=/tmp/hadoop-conf
          ls -la /tmp/hadoop-conf/

          echo "=== 4. Check HDFS connectivity from host ==="
          HDFS_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' hdfs)
          echo "HDFS container IP: $HDFS_IP"
          echo "krb5.conf:"
          cat /etc/krb5.conf
          echo "---"
          echo "/etc/hosts:"
          grep -E 'kdc|hdfs.test|nameservice' /etc/hosts || echo "(no entries)"

          echo "=== 5. Mount ==="
          sudo mkdir -p /mnt/hdfs && sudo chmod 777 /mnt/hdfs
          MOUNT_LOG="/tmp/mntrs-mount.log"
          # hdfs-native (libhdfs) needs these to find the kerberos
          # config and the host's ticket cache. Without HADOOP_CONF_DIR
          # it falls back to defaults that don't include the test
          # realm's KDC; without KRB5CCNAME the host process's
          # existing ticket isn't picked up by the daemon child (which
          # has no environment except what we explicitly set). Mount
          # via the hdfs hostname (not localhost) so the GSSAPI
          # service principal matches what the hdfs server registered
          # under at kadmin time.
          HADOOP_CONF_DIR=/tmp/hadoop-conf \
          KRB5_CONFIG=/etc/krb5.conf \
          KRB5CCNAME="FILE:$KRB5CCNAME" \
          MNTRS_DAEMON_LOG="$MOUNT_LOG" \
            ./target/release/mntrs mount hdfs://${HDFS_HOSTNAME}:8020/ /mnt/hdfs \
              --allow-other --daemon --daemon-wait --daemon-timeout=20 \
              --opt dfs.namenode.kerberos.principal=hdfs/${HDFS_HOSTNAME}@TEST.LOCAL \
              > "$MOUNT_LOG" 2>&1 &

          # Readiness probe: wait up to 60s for mount. Use cat (not ls)
          # because hdfs-native list_op trips FUSE readdir EIO on some
          # backends; cat goes through read which is the stable path.
          READY=0
          for i in $(seq 1 60); do
            if mount | grep -q /mnt/hdfs; then
              if cat /mnt/hdfs/test/hello.txt >/dev/null 2>&1; then
                echo "mount ready after ${i}s"
                READY=1
                break
              fi
            fi
            sleep 1
          done

          if [ $READY -eq 0 ]; then
            echo "::error::HDFS Kerberos mount not ready after 60s"
            echo "--- mount stdout/stderr ---"
            cat "$MOUNT_LOG"
            echo "--- mount table ---"
            mount | grep hdfs || echo "(no hdfs mount)"
            echo "--- ps mntrs ---"
            ps aux | grep mntrs | grep -v grep || echo "(no mntrs process)"
            exit 1
          fi

          # Per SESSION_PITFALLS §2.6: CI green ≠ tests pass — track failures explicitly
          FAIL=0
          if mount | grep -q /mnt/hdfs; then
            echo "=== 6. Verify ==="

            echo "--- ls ---"
            ls -laR /mnt/hdfs/ 2>&1

            echo "--- read pre-existing file ---"
            GOT=$(cat /mnt/hdfs/test/hello.txt 2>/dev/null)
            if [ "$GOT" = "hello kerberos hdfs" ]; then
              echo "read pre-existing OK: test/hello.txt"
            else
              echo "::error::read pre-existing FAIL: test/hello.txt (got '$GOT')"
              FAIL=1
            fi

            echo "--- write small file ---"
            echo "hello kerberos" > /mnt/hdfs/_ci_small.txt 2>/dev/null && echo "write OK" || { echo "write FAIL"; FAIL=1; }

            echo "--- read back ---"
            GOT=$(cat /mnt/hdfs/_ci_small.txt 2>/dev/null)
            if [ "$GOT" = "hello kerberos" ]; then echo "read back OK"
            else echo "read back FAIL: got '$GOT'"; FAIL=1; fi

            echo "--- append ---"
            echo "more" >> /mnt/hdfs/_ci_small.txt 2>/dev/null && echo "append OK" || { echo "append FAIL"; FAIL=1; }
            GOT=$(cat /mnt/hdfs/_ci_small.txt 2>/dev/null)
            if [ "$GOT" = "hello kerberos${NEWLINE}more" ]; then echo "append verify OK"
            else echo "(append verify: got '$GOT')"; fi

            echo "--- write+read 1M ---"
            dd if=/dev/urandom of=/mnt/hdfs/_ci_1m.bin bs=1M count=1 2>/dev/null && echo "write 1M OK" || { echo "write 1M FAIL"; FAIL=1; }
            dd if=/mnt/hdfs/_ci_1m.bin of=/dev/null bs=64K 2>/dev/null && echo "read 1M OK" || { echo "read 1M FAIL"; FAIL=1; }

            echo "--- cleanup ---"
            rm -f /mnt/hdfs/_ci_small.txt /mnt/hdfs/_ci_1m.bin 2>/dev/null || true

            if [ $FAIL -eq 0 ]; then
              echo "✅ HDFS Kerberos mount OK"
            else
              echo "::error::HDFS Kerberos mount tests FAILED"
              exit 1
            fi
          else
            echo "::error::HDFS Kerberos mount failed"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          fusermount3 -uz /mnt/hdfs 2>/dev/null
          docker rm -f hdfs 2>/dev/null

      # Per SESSION_PITFALLS §2.6: preserve post-mortem on failure.
      # Pattern adapted from bench.yml ("Upload rclone log" + actions/upload-artifact@v4).
      - name: Upload mount log (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mount-log-hdfs-kerberos
          path: /tmp/mntrs-mount.log
          if-no-files-found: warn
