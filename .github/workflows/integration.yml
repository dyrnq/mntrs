name: Integration Tests

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

jobs:
  build-hdfs-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      image: ghcr.io/${{ github.repository_owner }}/mntrs-hdfs:ci-test-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push HDFS image
        uses: docker/build-push-action@v6
        with:
          context: docker/hdfs
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mntrs-hdfs:ci-test-${{ github.sha }}

  mount-tests:
    needs: build-hdfs-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: memory
            storage: memory://
          - name: s3
            storage: s3://test-bucket
          - name: hdfs
            storage: hdfs://localhost:8020/

    services:
      minio:
        image: minio/minio:latest
        command: server /data
        options: --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1" --health-interval 5s
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev fuse3 protobuf-compiler
          sudo grep -q '^user_allow_other' /etc/fuse.conf || echo 'user_allow_other' | sudo tee -a /etc/fuse.conf

      - name: Build mntrs
        run: cargo build --release -p mntrs

      # ---- S3 backend: create bucket + upload test file ----
      - name: Setup MinIO (S3 only)
        if: matrix.backend.name == 's3'
        run: |
          pip3 install awscli
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin             aws --endpoint-url http://localhost:9000 --no-verify-ssl s3 mb s3://test-bucket 2>/dev/null || true
          echo "hello s3" > /tmp/s3-test.txt
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin             aws --endpoint-url http://localhost:9000 --no-verify-ssl s3 cp /tmp/s3-test.txt s3://test-bucket/

      # ---- HDFS backend: start container in simple auth mode ----
      - name: Setup HDFS (HDFS only)
        if: matrix.backend.name == 'hdfs'
        run: |
          # Override Kerberos core-site.xml with simple auth variant
          cat > /tmp/core-site-simple.xml << 'XML'
          <configuration>
            <property><name>fs.defaultFS</name><value>hdfs://localhost:8020</value></property>
            <property><name>hadoop.security.authentication</name><value>simple</value></property>
            <property><name>hadoop.security.authorization</name><value>false</value></property>
          </configuration>
          XML
          cat > /tmp/hdfs-site-simple.xml << 'XML'
          <configuration>
            <property><name>dfs.replication</name><value>1</value></property>
            <property><name>dfs.permissions.enabled</name><value>false</value></property>
            <property><name>dfs.datanode.address</name><value>0.0.0.0:9866</value></property>
            <property><name>dfs.datanode.http.address</name><value>0.0.0.0:9864</value></property>
            <property><name>dfs.datanode.hostname</name><value>${HOSTNAME}</value></property>
            <property><name>dfs.client.use.datanode.hostname</name><value>true</value></property>
          </configuration>
          XML
          docker run -d --name hdfs \
            -p 8020:8020 -p 9866:9866 -p 9864:9864 \
            --add-host $(hostname):127.0.0.1 \
            -v /tmp/hdfs-site-simple.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro \
            -v /tmp/core-site-simple.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro \
            ghcr.io/dyrnq/mntrs-hdfs:ci-test-${{ github.sha }}
          # Wait for NameNode
          for i in $(seq 1 20); do
            if docker exec -u mntrs hdfs /opt/hadoop/bin/hdfs dfsadmin -report >/dev/null 2>&1; then
              echo "HDFS ready"
              break
            fi
            sleep 5
          done
          docker logs hdfs 2>&1 | tail -5
          docker exec -u mntrs hdfs /opt/hadoop/bin/hdfs dfs -mkdir -p /test
          echo "hello hdfs" | docker exec -i -u mntrs hdfs /opt/hadoop/bin/hdfs dfs -put - /test/hello.txt

      # ---- Mount + read/write test ----
      - name: Test mount
        run: |
          sudo mkdir -p /mnt/mntrs-test && sudo chmod 777 /mnt/mntrs-test
          MOUNT_OPTS="--opt endpoint=http://localhost:9000 --opt access-key=minioadmin --opt secret-key=minioadmin --opt region=us-east-1"
          if [ "${{ matrix.backend.name }}" != "memory" ]; then
            MOUNT_OPTS="$MOUNT_OPTS --read-only"
          fi
          timeout 15 ./target/release/mntrs mount ${{ matrix.backend.storage }} /mnt/mntrs-test $MOUNT_OPTS 2>&1 &
          sleep 5
          FAIL=0
          if mount | grep -q /mnt/mntrs-test; then
            echo "--- 1. ls ---"
            ls -laR /mnt/mntrs-test/ 2>&1

            echo "--- 2. cat pre-existing files ---"
            case "${{ matrix.backend.name }}" in
              s3)
                EXPECTED="hello s3"
                GOT=$(cat /mnt/mntrs-test/s3-test.txt 2>/dev/null)
                if [ "$GOT" = "$EXPECTED" ]; then
                  echo "read pre-existing OK: s3-test.txt"
                else
                  echo "::error::read pre-existing FAIL: s3-test.txt (got '$GOT')"
                  FAIL=1
                fi
                ;;
              hdfs)
                EXPECTED="hello hdfs"
                GOT=$(cat /mnt/mntrs-test/test/hello.txt 2>/dev/null)
                if [ "$GOT" = "$EXPECTED" ]; then
                  echo "read pre-existing OK: test/hello.txt"
                else
                  echo "::error::read pre-existing FAIL: test/hello.txt (got '$GOT')"
                  FAIL=1
                fi
                ;;
            esac

            echo "--- 3. write small file ---"
            echo "hello from ${{ matrix.backend.name }}" > /mnt/mntrs-test/_ci_small.txt 2>/dev/null && echo "write OK" || echo "(write skipped: readonly)"

            echo "--- 4. read back written file ---"
            GOT=$(timeout 3 cat /mnt/mntrs-test/_ci_small.txt 2>/dev/null)
            if [ "$GOT" = "hello from ${{ matrix.backend.name }}" ]; then
              echo "read back OK"
            else
              echo "(write skipped: readonly - file not expected)"
            fi

            echo "--- 5. append write ---"
            echo "more data" >> /mnt/mntrs-test/_ci_small.txt 2>/dev/null && echo "append OK" || echo "(append skipped: readonly)"

            echo "--- 6. write+read 10M sequential ---"
            timeout 10 dd if=/dev/urandom of=/mnt/mntrs-test/_ci_10m.bin bs=1M count=10 2>/dev/null && echo "write 10M OK" || echo "(10M write skipped: readonly)"
            timeout 10 dd if=/mnt/mntrs-test/_ci_10m.bin of=/dev/null bs=64K 2>/dev/null && echo "read 10M OK" || echo "(10M read skipped: readonly)"

            echo "--- 7. random read 10M ---"
            for off in 0 500 10000 50000 500000 5000000 9000000 9999999; do
              timeout 5 dd if=/mnt/mntrs-test/_ci_10m.bin bs=1 count=1 skip=$off of=/dev/null 2>/dev/null && echo "  seek $off OK" || { echo "  seek $off FAIL"; FAIL=1; }
            done

            echo "--- 8. cleanup ---"
            rm -f /mnt/mntrs-test/_ci_small.txt /mnt/mntrs-test/_ci_10m.bin 2>/dev/null || true

            if [ $FAIL -eq 0 ]; then
              echo "✅ ${{ matrix.backend.name }} mount OK"
            else
              echo "::error::${{ matrix.backend.name }} mount tests FAILED"
              exit 1
            fi
          else
            echo "::error::${{ matrix.backend.name }} mount failed: not in mount table"
            mount | grep mntrs || true
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          if mount | grep -q /mnt/mntrs-test; then
            sudo fusermount3 -u /mnt/mntrs-test
          fi
          docker rm -f hdfs 2>/dev/null || true


  hdfs-kerberos:
    needs: build-hdfs-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y krb5-user libfuse3-dev fuse3
          sudo grep -q '^user_allow_other' /etc/fuse.conf || echo 'user_allow_other' | sudo tee -a /etc/fuse.conf

      - name: Start HDFS container
        run: |
          set -x
          docker run -d --name hdfs -p 8020:8020 -p 88:88 -p 749:749             ${{ needs.build-hdfs-image.outputs.image }}
          HDFS_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' hdfs)
          echo "HDFS container IP: $HDFS_IP"

          echo "=== Wait for NameNode + DataNode ==="
          docker exec hdfs /usr/bin/kinit -kt /tmp/hdfs.keytab hdfs/localhost@TEST.LOCAL
          for i in $(seq 1 20); do
            echo "  attempt $i..."
            if docker exec hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1 | grep -q "Live datanodes"; then
              echo "HDFS ready"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "::error::HDFS did not become ready after 20 attempts"
              docker exec hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1
              docker logs hdfs 2>&1 | tail -30
              exit 1
            fi
            sleep 5
          done

          echo "=== Container status ==="
          docker logs hdfs 2>&1 | tail -10
          docker exec hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1 | head -10

          echo "=== Extracting Kerberos config ==="
          docker cp hdfs:/tmp/testuser.keytab /tmp/testuser.keytab
          docker cp hdfs:/tmp/hdfs.keytab /tmp/hdfs.keytab
          docker cp hdfs:/etc/krb5.conf /tmp/krb5.conf
          echo "${HDFS_IP} kdc" | sudo tee -a /etc/hosts
          docker cp hdfs:/opt/hadoop/etc/hadoop/core-site.xml /tmp/core-site.xml
          docker cp hdfs:/opt/hadoop/etc/hadoop/hdfs-site.xml /tmp/hdfs-site.xml

      - name: Configure Kerberos
        run: |
          sudo cp /tmp/krb5.conf /etc/krb5.conf
          kinit -kt /tmp/testuser.keytab testuser@TEST.LOCAL
          klist

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Test HDFS Kerberos mount
        run: |
          set -x
          echo "=== 1. Renew Kerberos ticket ==="
          kinit -kt /tmp/testuser.keytab testuser@TEST.LOCAL
          klist

          echo "=== 2. Create test data in HDFS ==="
          docker exec hdfs /usr/bin/kinit -kt /tmp/hdfs.keytab hdfs/localhost@TEST.LOCAL
          docker exec hdfs /opt/hadoop/bin/hdfs dfs -mkdir -p /test
          docker exec hdfs /opt/hadoop/bin/hdfs dfs -chmod 777 /test
          echo "hello kerberos hdfs" | docker exec -i hdfs /opt/hadoop/bin/hdfs dfs -put - /test/hello.txt
          docker exec hdfs /opt/hadoop/bin/hdfs dfs -chmod 644 /test/hello.txt
          docker exec hdfs /opt/hadoop/bin/hdfs dfs -ls /test/

          echo "=== 3. Export Hadoop config for OpenDAL native HDFS backend ==="
          mkdir -p /tmp/hadoop-conf
          cp /tmp/core-site.xml /tmp/hadoop-conf/
          cp /tmp/hdfs-site.xml /tmp/hadoop-conf/
          export HADOOP_CONF_DIR=/tmp/hadoop-conf
          ls -la /tmp/hadoop-conf/

          echo "=== 4. Check HDFS connectivity from host ==="
          HDFS_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' hdfs)
          echo "HDFS container IP: $HDFS_IP"
          echo "krb5.conf:"
          cat /etc/krb5.conf
          echo "---"
          echo "/etc/hosts:"
          grep kdc /etc/hosts || echo "(no kdc entry)"

          echo "=== 5. Mount ==="
          sudo mkdir -p /mnt/hdfs && sudo chmod 777 /mnt/hdfs
          MOUNT_LOG="/tmp/mntrs-mount.log"
          timeout 20 ./target/release/mntrs mount hdfs://localhost:8020/ /mnt/hdfs \
            --read-only --allow-other --daemon --daemon-wait --daemon-timeout=20 \
            > "$MOUNT_LOG" 2>&1 &
          MOUNT_PID=$!
          sleep 5
          echo "--- mount stdout/stderr ---"
          cat "$MOUNT_LOG"
          echo "--- mount table ---"
          mount | grep hdfs || echo "(no hdfs mount)"
          echo "--- ps mntrs ---"
          ps aux | grep mntrs | grep -v grep || echo "(no mntrs process)"

          if mount | grep -q /mnt/hdfs; then
            echo "=== 6. Verify ==="
            ls -la /mnt/hdfs/
            cat /mnt/hdfs/test/hello.txt
            echo "✅ HDFS Kerberos mount OK"
          else
            echo "::error::HDFS Kerberos mount failed"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          fusermount3 -uz /mnt/hdfs 2>/dev/null
          docker rm -f hdfs 2>/dev/null
