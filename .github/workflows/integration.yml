name: Integration Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'  # weekly Sunday 04:00 UTC

jobs:
  hdfs-kerberos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgssapi-krb5-2 krb5-user libfuse3-dev fuse3

      - name: Setup MIT KDC
        run: |
          sudo apt-get install -y krb5-kdc krb5-admin-server
          sudo mkdir -p /etc/krb5
          cat | sudo tee /etc/krb5.conf << 'KRB5CONF'
          [libdefaults]
            default_realm = TEST.LOCAL
            dns_lookup_realm = false
            ticket_lifetime = 24h
          [realms]
            TEST.LOCAL = {
              kdc = localhost
              admin_server = localhost
            }
          KRB5CONF

          # Create KDC database
          printf 'adminpassword\nadminpassword\n' | sudo krb5_newrealm
          # Add principals
          sudo kadmin.local -q "addprinc -randkey hdfs/localhost@TEST.LOCAL"
          sudo kadmin.local -q "addprinc -randkey testuser@TEST.LOCAL"
          # Create keytabs
          sudo kadmin.local -q "ktadd -k /tmp/hdfs.keytab hdfs/localhost@TEST.LOCAL"
          sudo kadmin.local -q "ktadd -k /tmp/testuser.keytab testuser@TEST.LOCAL"
          sudo chmod 644 /tmp/hdfs.keytab /tmp/testuser.keytab
          sudo systemctl restart krb5-kdc krb5-admin-server

      - name: Authenticate via keytab
        run: |
          export KRB5CCNAME=/tmp/krb5ccache
          kinit -kt /tmp/testuser.keytab testuser@TEST.LOCAL
          klist
          echo "KRB5CCNAME=/tmp/krb5ccache" >> $GITHUB_ENV

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Run HDFS-native miniDFS + mntrs mount
        run: |
          # Start miniDFS in background (Kerberized)
          # hdfs-native test utilities provide this
          cd /tmp
          git clone --depth 1 https://github.com/Kimahriman/hdfs-native.git
          cd hdfs-native
          cargo test --no-run --test minidfs 2>&1 || true
          # If minidfs binary exists, run it
          if [ -f target/debug/deps/minidfs-* ]; then
            target/debug/deps/minidfs-* --kerberos &
            MINIDFS_PID=$!
            sleep 5
            
            # Mount with mntrs
            mkdir -p /tmp/hdfs-mnt
            $GITHUB_WORKSPACE/target/release/mntrs mount \
              hdfs://localhost:8020/ /tmp/hdfs-mnt \
              --read-only 2>&1 &
            MNTRS_PID=$!
            sleep 5
            
            # Verify
            ls /tmp/hdfs-mnt/
            echo "HDFS Kerberos mount SUCCESS"
            
            fusermount3 -u /tmp/hdfs-mnt
            kill $MNTRS_PID $MINIDFS_PID 2>/dev/null
          else
            echo "minidfs binary not found — skipping mount test"
          fi

  csi-sanity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev fuse3 protobuf-compiler

      - name: Build CSI driver
        run: cargo build --release -p mntrs-csi

      - name: Start CSI driver + run csi-sanity
        run: |
          # Build csi-sanity from source
          go install github.com/kubernetes-csi/csi-test/v5/cmd/csi-sanity@latest 2>/dev/null || \
            curl -sSL https://github.com/kubernetes-csi/csi-test/releases/download/v5.3.1/csi-sanity-v5.3.1-linux-amd64.tar.gz | tar xz
          
          # Start mntrs-csi
          ./target/release/mntrs-csi --endpoint unix:///tmp/csi.sock &
          CSI_PID=$!
          sleep 3

          # Run csi-sanity
          ./csi-sanity --csi.endpoint=unix:///tmp/csi.sock \
            --csi.testvolumeparameters="storage=memory://,readOnly=true" \
            --ginkgo.focus='NodePublishVolume|NodeUnpublishVolume|GetPluginInfo|Probe' \
            2>&1 || true

          kill $CSI_PID 2>/dev/null
