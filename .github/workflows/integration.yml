name: Integration Tests

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

jobs:
  mount-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: memory
            storage: memory://
          - name: s3
            storage: s3://test-bucket
          - name: hdfs
            storage: hdfs://localhost:8020/

    services:
      minio:
        image: minio/minio:latest
        command: server /data
        options: --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1" --health-interval 5s
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: bash tests/e2e/common/install-linux-deps.sh standard "" yes no

      - name: Build mntrs
        run: cargo build --release -p mntrs

      # ---- S3 backend: create bucket + upload test file ----
      - name: Setup MinIO (S3 only)
        if: matrix.backend.name == 's3'
        run: |
          pip3 install awscli
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin aws --endpoint-url http://localhost:9000 --no-verify-ssl s3 mb s3://test-bucket 2>/dev/null || true
          echo "hello s3" > /tmp/s3-test.txt
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin aws --endpoint-url http://localhost:9000 --no-verify-ssl s3 cp /tmp/s3-test.txt s3://test-bucket/

      # ---- HDFS backend: start container in simple auth mode ----
      - name: Setup HDFS (HDFS only)
        if: matrix.backend.name == 'hdfs'
        run: |
          # Uses the public dyrnq/hdfs:latest-debian image (source:
          # /data/work/docker-hdfs). Its entrypoint has first-class
          # simple-auth support: HADOOP_SECURITY_AUTHENTICATION=simple
          # strips the krb5kdc + kadmind s6 services and skips the
          # keytab/keystore bootstrap, so namenode/datanode start without
          # any Kerberos dependency — no in-line config mounts needed.
          # HDFS_HOSTNAME drives the placeholder rendering in the entrypoint
          # (fs.defaultFS, datanode hostname).
          # Run the HDFS container in --network host mode so the DN
          # binds directly to the host's network stack on 9866 / 8020 /
          # 9864. With the default bridge network + -p port forwarding,
          # DN binds to localhost:9866 *inside* the container and the
          # host's 127.0.0.1:9866 routes through docker's userland
          # proxy — which ConnectionReset's the block-read TCP connect
          # even though the same proxy works for the NN RPC at 8020
          # (probed working with s3/MinIO at 9000 too). The fork patch
          # alone does not fix this because host_name='localhost' on
          # the docker host still resolves to 127.0.0.1, same as
          # ip_addr. host network avoids the proxy entirely — the
          # container's 127.0.0.1:9866 IS the host's 127.0.0.1:9866,
          # so mntrs's connection (also on the host) lands directly
          # on the DN listener.
          . tests/e2e/common/start-hdfs-container.sh
          start_hdfs_container simple hdfs localhost

          # HDFS root is 755:hdfs:supergroup by default. chmod 777 / so the
          # GHA runner user can create at the FUSE mount root; chmod 777 /test
          # so the test seed file is in a subdir any user can read+write.
          # See tests/e2e/common/hdfs-prep.sh for the shared prep rationale
          # and the matching csi/hdfs.sh + csi/hdfs-kerberos.sh callers.
          docker exec -u hdfs hdfs /opt/hadoop/bin/hdfs dfs -mkdir -p /test
          bash tests/e2e/common/hdfs-prep.sh docker
          echo "hello hdfs" | docker exec -i -u hdfs hdfs /opt/hadoop/bin/hdfs dfs -put - /test/hello.txt

      # ---- Mount + read/write test ----
      # 8 common sub-tests (mount, ls, cat pre-existing, write small,
      # read back, append+verify, 10M write+read, random seek) live in
      # tests/e2e/common/mount-test.sh. Three integration-only extras
      # (append-pre-existing, recreate, dir ops) stay inline below.
      - name: Test mount
        run: |
          . tests/e2e/common/mount-test.sh
          # MOUNT_OPTS is backend-specific. s3 needs the MinIO endpoint +
          # creds; hdfs needs the hdfs-native fork switch (Cargo.toml
          # [patch.crates-io]) to talk to the DataNode via host_name
          # rather than the in-container loopback ip_addr that won't
          # resolve on the docker host. Other backends (memory) need
          # no extra opts. See issue #148.
          case "${{ matrix.backend.name }}" in
            s3)
              MOUNT_OPTS="--opt endpoint=http://localhost:9000 --opt access-key=minioadmin --opt secret-key=minioadmin --opt region=us-east-1"
              ;;
            hdfs)
              MOUNT_OPTS="--opt dfs.client.use.datanode.hostname=true"
              ;;
            *)
              MOUNT_OPTS=""
              ;;
          esac
          case "${{ matrix.backend.name }}" in
            s3)   PRE_EXISTING="s3-test.txt"  && EXPECTED="hello s3"   ;;
            hdfs) PRE_EXISTING="test/hello.txt" && EXPECTED="hello hdfs" ;;
            *)    PRE_EXISTING=""              && EXPECTED=""           ;;
          esac
          DAEMON_MODE=fg
          [ "${{ matrix.backend.name }}" = "hdfs" ] && DAEMON_MODE=daemon
          KRB5CCNAME="${KRB5CCNAME}" \
            mount_test "${{ matrix.backend.name }}" "${{ matrix.backend.storage }}" \
              /mnt/mntrs-test "$MOUNT_OPTS" "$PRE_EXISTING" "$EXPECTED" \
              "$DAEMON_MODE" "/tmp/mntrs-mount-${{ matrix.backend.name }}.log" \
            || MOUNT_TEST_FAILED=1

          # integration.yml-only extras (mount_test covers the 8
          # common tests but these 3 are integration-specific):
          if [ -z "${MOUNT_TEST_FAILED:-}" ]; then
            echo "--- 9. append to pre-existing file ---"
            if [ -n "$PRE_EXISTING" ]; then
              FAIL=0
              echo "appended" >> "/mnt/mntrs-test/${PRE_EXISTING}" 2>/dev/null && echo "append pre-existing OK" || { echo "append pre-existing FAIL"; FAIL=1; }
              GOT=$(cat "/mnt/mntrs-test/${PRE_EXISTING}" 2>/dev/null)
              if echo "$GOT" | grep -q "appended"; then echo "append pre-existing verify OK"
              else echo "::error::append pre-existing verify FAIL: got '$GOT'"; FAIL=1; fi
              [ $FAIL -eq 0 ] || MOUNT_TEST_FAILED=1
            else
              echo "(skipped: no pre-existing file for ${{ matrix.backend.name }})"
            fi

            echo "--- 10. delete + recreate ---"
            rm -f /mnt/mntrs-test/_ci_small.txt 2>/dev/null
            if echo "recreated" > /mnt/mntrs-test/_ci_small.txt 2>/dev/null; then
              echo "recreate OK"
              GOT=$(cat /mnt/mntrs-test/_ci_small.txt 2>/dev/null)
              if [ "$GOT" = "recreated" ]; then echo "recreate verify OK"
              else echo "::error::recreate verify FAIL: got '$GOT'"; MOUNT_TEST_FAILED=1; fi
            else
              echo "::error::recreate FAIL"
              MOUNT_TEST_FAILED=1
            fi

            echo "--- 11. directory create + list + delete ---"
            FAIL=0
            mkdir -p /mnt/mntrs-test/_ci_dir 2>/dev/null && echo "mkdir OK" || { echo "mkdir FAIL"; FAIL=1; }
            echo "dirfile" > /mnt/mntrs-test/_ci_dir/file.txt 2>/dev/null
            GOT=$(ls /mnt/mntrs-test/_ci_dir/ 2>/dev/null)
            if [ "$GOT" = "file.txt" ]; then echo "dir list OK"
            else echo "::error::dir list FAIL: got '$GOT'"; FAIL=1; fi
            rm -rf /mnt/mntrs-test/_ci_dir 2>/dev/null && echo "rmdir OK" || { echo "rmdir FAIL"; FAIL=1; }
            rm -f /mnt/mntrs-test/_ci_small.txt /mnt/mntrs-test/_ci_10m.bin 2>/dev/null || true
            [ $FAIL -eq 0 ] || MOUNT_TEST_FAILED=1
          fi

          if [ -n "${MOUNT_TEST_FAILED:-}" ]; then
            echo "::error::${{ matrix.backend.name }} mount tests FAILED"
            exit 1
          fi
          echo "✅ ${{ matrix.backend.name }} mount OK (incl. integration-only extras)"

      # HDFS diagnostic dump — runs on success OR failure (always()),
      # BEFORE Cleanup so the container still exists. Bundles the
      # full container log, dfsadmin -report, host-side port listings,
      # the docker inspect metadata, and a probe of the host's
      # 127.0.0.1:<port> reachability so post-mortem has a single
      # artifact to grep instead of re-running.
      - name: Collect HDFS diagnostics
        if: matrix.backend.name == 'hdfs' && always()
        run: |
          DIAG=/tmp/hdfs-diag
          mkdir -p "${DIAG}"
          # docker logs (full, with timestamps). Use --details to
          # preserve stream identifiers (stdout vs stderr) which
          # helps tell entrypoint from s6 service output.
          docker logs --details --timestamps hdfs > "${DIAG}/docker-logs.txt" 2>&1 || true
          # dfsadmin -report — full output (head -200 to bound size;
          # a healthy single-DN cluster is <50 lines).
          docker exec -u hdfs hdfs /opt/hadoop/bin/hdfs dfsadmin -report > "${DIAG}/dfsadmin-report.txt" 2>&1 || true
          # NameNode + DataNode RPC endpoints (sanity: are they
          # actually listening?).
          docker exec hdfs bash -c 'echo "--- namenode rpc ---"; ss -ltnp 2>/dev/null | grep -E ":(8020|9866|9864|9867) " || true; echo "--- datanode rpc ---"; ss -ltn 2>/dev/null | grep -E ":(8020|9866|9864|9867) " || true' > "${DIAG}/ss.txt" 2>&1 || true
          # Container inspect — network mode, port bindings, env
          # (HDFS_HOSTNAME etc.), and image digest for cross-run
          # correlation.
          docker inspect hdfs > "${DIAG}/docker-inspect.json" 2>&1 || true
          # Host-side reachability probe — does the GHA runner's
          # 127.0.0.1 actually accept TCP on the HDFS ports? This
          # distinguishes "DN not bound" (connect refused) from
          # "docker proxy reset" (TCP RST) from "bind ok, client
          # mismatch" (bind ok).
          for p in 8020 9866 9864 9867; do
            {
              echo "--- 127.0.0.1:${p} ---"
              timeout 3 bash -c "exec 3<>/dev/tcp/127.0.0.1/${p} && echo OK || echo FAIL"
            } >> "${DIAG}/host-loopback-probe.txt" 2>&1 || true
          done
          # Mount log + previously-uploaded dfsadmin report
          # (cross-reference).
          cp /tmp/mntrs-mount-hdfs.log "${DIAG}/" 2>/dev/null || true
          cp /tmp/hdfs-dfsadmin-report.txt "${DIAG}/" 2>/dev/null || true
          ls -la "${DIAG}"
        # Upload to a stable artifact name; overwrite is fine since
        # only one hdfs job runs per matrix at a time.
        # NOTE: must use a separate step with upload-artifact@v4 —
        # combining the dump script and the upload into one step
        # doesn't work because run: doesn't accept uses:.

      - name: Upload HDFS diagnostics
        if: matrix.backend.name == 'hdfs' && always()
        uses: actions/upload-artifact@v4
        with:
          name: hdfs-diag-${{ matrix.backend.name }}
          path: /tmp/hdfs-diag
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          . tests/e2e/common/ci-cleanup.sh
          cleanup_fuse_mount /mnt/mntrs-test
          cleanup_docker_container hdfs

      # Per SESSION_PITFALLS §2.6: CI green ≠ tests pass; on failure, preserve
      # the mount log and HDFS dfsadmin report for post-mortem. Pattern adapted
      # from bench.yml ("Upload rclone log" + "actions/upload-artifact@v4").
      - name: Upload mount log (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mount-log-${{ matrix.backend.name }}
          path: /tmp/mntrs-mount-${{ matrix.backend.name }}.log
          if-no-files-found: warn

      - name: Upload HDFS dfsadmin report (failure, hdfs only)
        if: failure() && matrix.backend.name == 'hdfs'
        uses: actions/upload-artifact@v4
        with:
          name: hdfs-dfsadmin-report
          path: /tmp/hdfs-dfsadmin-report.txt
          if-no-files-found: warn


  hdfs-kerberos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: bash tests/e2e/common/install-linux-deps.sh standard "krb5-user" no no

      - name: Start HDFS container
        env:
          HDFS_HOSTNAME: hdfs.test
        run: |
          # Use the public dyrnq/hdfs:latest-debian image in kerberos mode
          # (default — no HADOOP_SECURITY_AUTHENTICATION=simple). The
          # entrypoint renders in-tree config from HDFS_HOSTNAME, starts
          # krb5kdc → kadmind → namenode → datanode, and bootstraps the
          # KDC database + principals + keytab on first run.
          # Principal: hdfs/hdfs.test@TEST.LOCAL
          # Keytab: /etc/hadoop/hdfs.keytab (user hdfs)
          # krb5.conf: realm=TEST.LOCAL, kdc=localhost:88
          # No inline config mounts needed — the in-tree templates carry
          # the same kerberos settings the old HA nameservice config did.
          . tests/e2e/common/start-hdfs-container.sh
          start_hdfs_container kerberos hdfs "$HDFS_HOSTNAME"

          echo "=== Extracting Kerberos config ==="
          docker cp hdfs:/etc/hadoop/hdfs.keytab /tmp/hdfs.keytab
          docker cp hdfs:/etc/krb5.conf /tmp/krb5.conf
          # hdfs.test must point to 127.0.0.1 because docker's port forward
          # exposes the container's ports on the host's loopback. The image's
          # krb5.conf has kdc=localhost:88 and admin_server=localhost:749;
          # those ports are published (-p 88:88 -p 749:749), so localhost
          # from the host reaches the container's KDC via the port forward.
          # No separate kdc alias or nameservice entry is needed — the new
          # image runs in single-namenode (non-HA) mode.
          echo "127.0.0.1 hdfs.test" | sudo tee -a /etc/hosts
          docker cp hdfs:/opt/hadoop/etc/hadoop/core-site.xml /tmp/core-site.xml
          docker cp hdfs:/opt/hadoop/etc/hadoop/hdfs-site.xml /tmp/hdfs-site.xml

      - name: Configure Kerberos
        env:
          HDFS_HOSTNAME: hdfs.test
        run: |
          sudo cp /tmp/krb5.conf /etc/krb5.conf
          # The image's krb5.conf already has rdns=false; add the two DNS
          # lookup knobs to avoid blocking on DNS in CI (no external DNS).
          # dns_lookup_kdc/realm=false is safe here because the krb5.conf
          # has explicit kdc=localhost and admin_server=localhost entries.
          sudo sed -i '/^\[libdefaults\]/a\dns_lookup_kdc = false\n\tdns_lookup_realm = false' /etc/krb5.conf
          # kinit with the hdfs principal (superuser). The keytab was
          # extracted from the container's /etc/hadoop/hdfs.keytab.
          kinit -kt /tmp/hdfs.keytab hdfs/${HDFS_HOSTNAME}@TEST.LOCAL
          klist

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Test HDFS Kerberos mount
        env:
          HDFS_HOSTNAME: hdfs.test
        run: |
          # All Kerberos-specific prep (host kinit, in-container seed,
          # HADOOP_CONF_DIR staging, mount-with-GSSAPI, 60s readiness
          # via `cat` not `ls`, 10 sub-tests) lives in
          # tests/e2e/common/hdfs-kerberos-mount-test.sh. The script
          # is Kerberos-only (different from tests/e2e/common/mount-test.sh
          # which covers memory/s3/hdfs-simple).
          . tests/e2e/common/hdfs-kerberos-mount-test.sh
          hdfs_kerberos_mount_test "/mnt/hdfs" "$HDFS_HOSTNAME" "TEST.LOCAL" \
            "test/hello.txt" "hello kerberos hdfs" \
            "/tmp/mntrs-mount.log" \
            || { echo "::error::HDFS Kerberos mount tests FAILED"; exit 1; }
          echo "✅ HDFS Kerberos mount OK"

      - name: Cleanup
        if: always()
        run: |
          . tests/e2e/common/ci-cleanup.sh
          cleanup_fuse_mount /mnt/hdfs
          cleanup_docker_container hdfs
          # Security audit H6: securely delete the extracted keytab.
          # `shred -u` overwrites before unlink so it can't be recovered
          # from the runner's disk after the job ends. `|| true` because
          # the keytab may already be gone if the prior step failed
          # before it was written.
          shred -u /tmp/hdfs.keytab 2>/dev/null || true

      # Per SESSION_PITFALLS §2.6: preserve post-mortem on failure.
      # Pattern adapted from bench.yml ("Upload rclone log" + actions/upload-artifact@v4).
      - name: Upload mount log (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mount-log-hdfs-kerberos
          path: /tmp/mntrs-mount.log
          if-no-files-found: warn

  # Stress loop on the memory backend — surfaces flakes that
  # single-run tests miss. The memory backend has no remote
  # state, so a flake here is purely an mntrs-side bug. The
  # script runs 50 iterations of the 11 sub-tests + rename.
  memory-stress-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: bash tests/e2e/common/install-linux-deps.sh standard "" no no

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Run 50-iteration stress loop
        run: |
          chmod +x ./tests/e2e/mount/stress_loop.sh
          STRESS_LOG=/tmp/mntrs-stress-loop.log
          ./tests/e2e/mount/stress_loop.sh 50 > "$STRESS_LOG" 2>&1

      - name: Upload stress log (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stress-loop-log
          path: /tmp/mntrs-stress-loop.log
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          . tests/e2e/common/ci-cleanup.sh
          cleanup_fuse_mount /tmp/mntrs-test
          pkill -9 -f "target/release/mntrs mount" 2>/dev/null || true

  # Mount/unmount lifecycle stress — catches process leaks, FD leaks,
  # session.join() regressions, and signal handling issues.
  lifecycle-stress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: bash tests/e2e/common/install-linux-deps.sh standard "" no no

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Lifecycle stress (memory, 50 iterations)
        run: |
          chmod +x ./tests/e2e/mount/lifecycle_stress.sh
          LIFECYCLE_LOG=/tmp/mntrs-lifecycle-stress.log
          ./tests/e2e/mount/lifecycle_stress.sh 50 target/release/mntrs /tmp/mntrs-lifecycle > "$LIFECYCLE_LOG" 2>&1

      - name: Upload lifecycle stress log (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-stress-log
          path: /tmp/mntrs-lifecycle-stress.log
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          . tests/e2e/common/ci-cleanup.sh
          cleanup_fuse_mount /tmp/mntrs-lifecycle
          pkill -9 -f "target/release/mntrs mount.*lifecycle" 2>/dev/null || true

  # S3 lifecycle stress + writeback crash recovery — verifies
  # mount/unmount cleanup and dirty-cache recovery against real S3.
  s3-lifecycle-stress:
    runs-on: ubuntu-latest
    services:
      minio:
        image: minio/minio:latest
        command: server /data
        options: --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1" --health-interval 5s
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: bash tests/e2e/common/install-linux-deps.sh standard "" no yes

      - name: Install mc (MinIO client)
        run: go install github.com/minio/mc@latest

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Create S3 bucket
        run: |
          mc alias set ci http://localhost:9000 minioadmin minioadmin
          mc mb ci/ci-lifecycle-test 2>/dev/null || true

      - name: S3 lifecycle stress (30 iterations)
        run: |
          chmod +x ./tests/e2e/mount/lifecycle_stress.sh
          export LIFECYCLE_S3_URL="s3://ci-lifecycle-test"
          export LIFECYCLE_S3_OPTS="--opt endpoint=http://localhost:9000 --opt access-key=minioadmin --opt secret-key=minioadmin --opt region=us-east-1"
          S3_LIFECYCLE_LOG=/tmp/mntrs-s3-lifecycle-stress.log
          ./tests/e2e/mount/lifecycle_stress.sh 30 target/release/mntrs /tmp/mntrs-s3-lifecycle > "$S3_LIFECYCLE_LOG" 2>&1

      - name: Writeback crash recovery
        run: |
          chmod +x ./tests/e2e/mount/writeback_recovery.sh
          export WB_S3_ENDPOINT="http://localhost:9000"
          export WB_S3_ACCESS="minioadmin"
          export WB_S3_SECRET="minioadmin"
          WB_RECOVERY_LOG=/tmp/mntrs-writeback-recovery.log
          ./tests/e2e/mount/writeback_recovery.sh target/release/mntrs /tmp/mntrs-wb-cache > "$WB_RECOVERY_LOG" 2>&1

      - name: Upload s3 lifecycle + writeback logs (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: s3-lifecycle-stress-log
          path: |
            /tmp/mntrs-s3-lifecycle-stress.log
            /tmp/mntrs-writeback-recovery.log
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          . tests/e2e/common/ci-cleanup.sh
          cleanup_fuse_mount /tmp/mntrs-s3-lifecycle
          cleanup_fuse_mount /tmp/mntrs-wb-recovery
          pkill -9 -f "target/release/mntrs mount" 2>/dev/null || true
