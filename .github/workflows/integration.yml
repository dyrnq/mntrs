name: Integration Tests


permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'  # weekly Sunday 04:00 UTC

jobs:
  csi-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev fuse3 protobuf-compiler
          # Allow non-root FUSE mounts with allow_other
          sudo grep -q '^user_allow_other' /etc/fuse.conf || echo 'user_allow_other' | sudo tee -a /etc/fuse.conf

      - name: Build CSI driver
        run: cargo build --release -p mntrs-csi

      - name: Start CSI driver + run csi-sanity
        run: |
          # Download csi-sanity (try go install, fallback to prebuilt binary)
          CSI_SANITY=""
          if go install github.com/kubernetes-csi/csi-test/v5/cmd/csi-sanity@latest; then
            CSI_SANITY="$(go env GOPATH)/bin/csi-sanity"
          elif curl -sSL https://github.com/kubernetes-csi/csi-test/releases/download/v5.3.1/csi-sanity-v5.3.1-linux-amd64.tar.gz | tar xz; then
            CSI_SANITY="./csi-sanity"
          fi
          if [ ! -x "$CSI_SANITY" ]; then
            echo "::error::csi-sanity not available (go install and curl both failed)"
            exit 1
          fi

          # Start mntrs-csi
          ./target/release/mntrs-csi --endpoint unix:///tmp/csi.sock &
          CSI_PID=$!
          sleep 3

          # csi-sanity v5 expects --csi.testvolumeparameters to be a file path (YAML/JSON),
          # not inline key=value. Generate a temp YAML file.
          cat > /tmp/csi-test-params.yaml << 'EOF'
          storage: "memory://"
          readOnly: "true"
          EOF

          # Run csi-sanity (non-zero exit is expected — known unimplemented CSI methods)
          "$CSI_SANITY" --csi.endpoint=unix:///tmp/csi.sock \
            --csi.testvolumeparameters=/tmp/csi-test-params.yaml \
            --ginkgo.focus='NodePublishVolume|NodeUnpublishVolume|GetPluginInfo|Probe' --ginkgo.skip='remove target path' \
            2>&1
          CSI_EXIT=$?
          if [ $CSI_EXIT -ne 0 ]; then
            echo "::warning::csi-sanity exited $CSI_EXIT (known: CSI driver unimplemented methods)"
          fi

          kill $CSI_PID
