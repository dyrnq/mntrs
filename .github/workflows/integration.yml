name: Integration Tests

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

jobs:
  mount-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: memory
            storage: memory://
          - name: s3
            storage: s3://test-bucket
          - name: hdfs
            storage: hdfs://localhost:8020/

    services:
      minio:
        image: minio/minio:latest
        command: server /data
        options: --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1" --health-interval 5s
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: bash tests/e2e/common/install-linux-deps.sh standard "" yes no

      - name: Build mntrs
        run: cargo build --release -p mntrs

      # ---- S3 backend: create bucket + upload test file ----
      - name: Setup MinIO (S3 only)
        if: matrix.backend.name == 's3'
        run: |
          pip3 install awscli
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin aws --endpoint-url http://localhost:9000 --no-verify-ssl s3 mb s3://test-bucket 2>/dev/null || true
          echo "hello s3" > /tmp/s3-test.txt
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin aws --endpoint-url http://localhost:9000 --no-verify-ssl s3 cp /tmp/s3-test.txt s3://test-bucket/

      # ---- HDFS backend: start container in simple auth mode ----
      - name: Setup HDFS (HDFS only)
        if: matrix.backend.name == 'hdfs'
        run: |
          # Uses the public dyrnq/hdfs:latest-debian image (source:
          # /data/work/docker-hdfs). Its entrypoint has first-class
          # simple-auth support: HADOOP_SECURITY_AUTHENTICATION=simple
          # strips the krb5kdc + kadmind s6 services and skips the
          # keytab/keystore bootstrap, so namenode/datanode start without
          # any Kerberos dependency — no in-line config mounts needed.
          # HDFS_HOSTNAME drives the placeholder rendering in the entrypoint
          # (fs.defaultFS, datanode hostname).
          # Run the HDFS container in --network host mode so the DN
          # binds directly to the host's network stack on 9866 / 8020 /
          # 9864. With the default bridge network + -p port forwarding,
          # DN binds to localhost:9866 *inside* the container and the
          # host's 127.0.0.1:9866 routes through docker's userland
          # proxy — which ConnectionReset's the block-read TCP connect
          # even though the same proxy works for the NN RPC at 8020
          # (probed working with s3/MinIO at 9000 too). The fork patch
          # alone does not fix this because host_name='localhost' on
          # the docker host still resolves to 127.0.0.1, same as
          # ip_addr. host network avoids the proxy entirely — the
          # container's 127.0.0.1:9866 IS the host's 127.0.0.1:9866,
          # so mntrs's connection (also on the host) lands directly
          # on the DN listener.
          docker run -d --name hdfs --network host \
            -e HADOOP_SECURITY_AUTHENTICATION=simple \
            -e HDFS_HOSTNAME=localhost \
            dyrnq/hdfs:latest-debian

          # Wait for NameNode + DataNode (must have ≥1 live datanode)
          for i in $(seq 1 30); do
            # Probe readiness by attempting a real write instead of parsing
            # dfsadmin text output — avoids brittle regex on format changes.
            if echo "probe" | docker exec -i -u hdfs hdfs /opt/hadoop/bin/hdfs dfs -put - /_readiness_probe 2>/dev/null \
               && docker exec -u hdfs hdfs /opt/hadoop/bin/hdfs dfs -rm /_readiness_probe >/dev/null 2>&1; then
              echo "HDFS ready after ${i} attempts"
              break
            fi
            echo "  attempt $i: waiting for HDFS write readiness..."
            if [ $i -eq 30 ]; then
              echo "::error::HDFS not ready after 30 attempts"
              docker exec -u hdfs hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1 | head -20
              docker logs hdfs 2>&1 | tail -20
              exit 1
            fi
            sleep 3
          done
          docker logs hdfs 2>&1 | tail -5
          docker exec -u hdfs hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1 | head -10
          docker exec -u hdfs hdfs /opt/hadoop/bin/hdfs dfs -mkdir -p /test
          # HDFS root is 755:hdfs:supergroup by default. chmod 777 / so the
          # GHA runner user can create at the FUSE mount root; chmod 777 /test
          # so the test seed file is in a subdir any user can read+write.
          # See tests/e2e/common/hdfs-prep.sh for the shared prep rationale
          # and the matching csi/hdfs.sh + csi/hdfs-kerberos.sh callers.
          bash tests/e2e/common/hdfs-prep.sh docker
          echo "hello hdfs" | docker exec -i -u hdfs hdfs /opt/hadoop/bin/hdfs dfs -put - /test/hello.txt

      # ---- Mount + read/write test ----
      - name: Test mount
        run: |
          sudo mkdir -p /mnt/mntrs-test && sudo chmod 777 /mnt/mntrs-test
          # MOUNT_OPTS is backend-specific. s3 needs the MinIO endpoint +
          # creds; hdfs needs the hdfs-native fork switch (Cargo.toml
          # [patch.crates-io]) to talk to the DataNode via host_name
          # rather than the in-container loopback ip_addr that won't
          # resolve on the docker host. Other backends (memory) need
          # no extra opts. See issue #148.
          case "${{ matrix.backend.name }}" in
            s3)
              MOUNT_OPTS="--opt endpoint=http://localhost:9000 --opt access-key=minioadmin --opt secret-key=minioadmin --opt region=us-east-1"
              ;;
            hdfs)
              MOUNT_OPTS="--opt dfs.client.use.datanode.hostname=true"
              ;;
            *)
              MOUNT_OPTS=""
              ;;
          esac
          # hdfs backend uses --daemon --daemon-wait (parent exits after spawn); other backends run in foreground
          # Per SESSION_PITFALLS §2.2: --daemon re-execs, $! is unreliable — use mount table only
          # Per SESSION_PITFALLS §2.4: hdfs-native can return root entry / trailing slashes; ls may EIO briefly
          MOUNT_LOG="/tmp/mntrs-mount-${{ matrix.backend.name }}.log"
          if [ "${{ matrix.backend.name }}" = "hdfs" ]; then
            # MNTRS_DAEMON_LOG redirects daemon child's stdout/stderr to the
            # MOUNT_LOG file (the > $MOUNT_LOG 2>&1 above only captures the
            # parent, which exits immediately after spawning the daemon —
            # see SESSION_PITFALLS §2.2). Without this, daemon's tracing
            # output goes to /dev/null and the artifact is empty.
            KRB5CCNAME="${KRB5CCNAME}" \
            MNTRS_DAEMON_LOG="$MOUNT_LOG" \
              ./target/release/mntrs mount ${{ matrix.backend.storage }} /mnt/mntrs-test $MOUNT_OPTS --allow-other --daemon --daemon-wait --daemon-timeout=20 > "$MOUNT_LOG" 2>&1 &
          else
            ./target/release/mntrs mount ${{ matrix.backend.storage }} /mnt/mntrs-test $MOUNT_OPTS > "$MOUNT_LOG" 2>&1 &
          fi

          # Readiness probe: wait up to 60s for mount + ls to both succeed
          # HDFS containers take 30-60s to fully boot; mem/s3 are sub-second
          FAIL=0
          READY=0
          for i in $(seq 1 60); do
            if mount | grep -q /mnt/mntrs-test; then
              # ls may transiently EIO on hdfs while NameNode finishes startup
              if ls /mnt/mntrs-test/ >/dev/null 2>&1; then
                echo "mount ready after ${i}s"
                READY=1
                break
              fi
            fi
            sleep 1
          done

          if [ $READY -eq 0 ]; then
            echo "::error::${{ matrix.backend.name }} mount not ready after 60s"
            echo "--- mount log ---"
            cat "$MOUNT_LOG" 2>/dev/null || true
            echo "--- mount table ---"
            mount | grep mntrs-test || echo "(no mount)"
            echo "--- mntrs processes ---"
            pgrep -alf mntrs || echo "(no mntrs process)"
            if [ "${{ matrix.backend.name }}" = "hdfs" ]; then
              echo "--- HDFS dfsadmin -report (server side) ---"
              docker exec -u hdfs hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1 | tee /tmp/hdfs-dfsadmin-report.txt | head -30 || true
            fi
            echo "--- fusermount might be needed ---"
            exit 1
          fi

          # Pre-flight: the FUSE mount root maps to HDFS /, which the
          # image boots as 755:hdfs:supergroup. The GHA runner user
          # (or any non-hdfs user) can `ls` (read) but not `create`.
          # Catches the missing-chmod-777 class of bug with a clear
          # pointer to the prep script, instead of letting every later
          # write fail with a cryptic AccessControlException.
          if [ "${{ matrix.backend.name }}" = "hdfs" ]; then
            if ! touch /mnt/mntrs-test/.preflight_probe 2>/dev/null; then
              echo "::error::HDFS root not writable by $(id -un) — FUSE mount-tests would all fail with AccessControlException"
              echo "  fix: tests/e2e/common/hdfs-prep.sh docker (chmod 777 / + chmod 777 /test)"
              FAIL=1
            else
              rm -f /mnt/mntrs-test/.preflight_probe
              echo "preflight OK: mount root writable by $(id -un)"
            fi
          fi

          # Per SESSION_PITFALLS §2.6: CI green ≠ tests pass — track failures explicitly
          if mount | grep -q /mnt/mntrs-test; then
            echo "--- 1. ls ---"
            ls -laR /mnt/mntrs-test/ 2>&1

            echo "--- 2. cat pre-existing files ---"
            case "${{ matrix.backend.name }}" in
              s3)
                EXPECTED="hello s3"
                GOT=$(cat /mnt/mntrs-test/s3-test.txt 2>/dev/null)
                if [ "$GOT" = "$EXPECTED" ]; then
                  echo "read pre-existing OK: s3-test.txt"
                else
                  echo "::error::read pre-existing FAIL: s3-test.txt (got '$GOT')"
                  FAIL=1
                fi
                ;;
              hdfs)
                EXPECTED="hello hdfs"
                GOT=$(cat /mnt/mntrs-test/test/hello.txt 2>/dev/null)
                if [ "$GOT" = "$EXPECTED" ]; then
                  echo "read pre-existing OK: test/hello.txt"
                else
                  echo "::error::read pre-existing FAIL: test/hello.txt (got '$GOT')"
                  FAIL=1
                fi
                ;;
            esac

            echo "--- 3. write small file ---"
            echo "hello from ${{ matrix.backend.name }}" > /mnt/mntrs-test/_ci_small.txt 2>/dev/null && echo "write OK" || { echo "write FAIL"; FAIL=1; }

            echo "--- 4. read back written file ---"
            GOT=$(cat /mnt/mntrs-test/_ci_small.txt 2>/dev/null)
            if [ "$GOT" = "hello from ${{ matrix.backend.name }}" ]; then
              echo "read back OK"
            else
              echo "::error::read back FAIL: got '$GOT'"
              FAIL=1
            fi

            echo "--- 5. append write + verify ---"
            echo "more data" >> /mnt/mntrs-test/_ci_small.txt 2>/dev/null && echo "append OK" || { echo "append FAIL"; FAIL=1; }
            GOT=$(cat /mnt/mntrs-test/_ci_small.txt 2>/dev/null)
            EXPECTED=$(printf "hello from ${{ matrix.backend.name }}\nmore data")
            if [ "$GOT" = "$EXPECTED" ]; then echo "append verify OK"
            else echo "::error::append verify FAIL: got '$GOT'"; FAIL=1; fi

            echo "--- 6. append to pre-existing file ---"
            case "${{ matrix.backend.name }}" in
              s3)
                PRE_EXISTING="s3-test.txt" ;;
              hdfs)
                PRE_EXISTING="test/hello.txt" ;;
              *)
                PRE_EXISTING="" ;;
            esac
            if [ -n "$PRE_EXISTING" ]; then
              echo "appended" >> "/mnt/mntrs-test/${PRE_EXISTING}" 2>/dev/null && echo "append pre-existing OK" || { echo "append pre-existing FAIL"; FAIL=1; }
              GOT=$(cat "/mnt/mntrs-test/${PRE_EXISTING}" 2>/dev/null)
              if echo "$GOT" | grep -q "appended"; then echo "append pre-existing verify OK"
              else echo "::error::append pre-existing verify FAIL: got '$GOT'"; FAIL=1; fi
            else
              echo "(skipped: no pre-existing file for ${{ matrix.backend.name }})"
            fi

            echo "--- 7. write+read 10M sequential ---"
            dd if=/dev/urandom of=/mnt/mntrs-test/_ci_10m.bin bs=1M count=10 2>/dev/null && echo "write 10M OK" || { echo "write 10M FAIL"; FAIL=1; }
            dd if=/mnt/mntrs-test/_ci_10m.bin of=/dev/null bs=64K 2>/dev/null && echo "read 10M OK" || { echo "read 10M FAIL"; FAIL=1; }

            echo "--- 8. random seek read ---"
            for off in 0 500 10000 50000 500000 5000000 9000000 9999999; do
              dd if=/mnt/mntrs-test/_ci_10m.bin bs=1 count=1 skip=$off of=/dev/null 2>/dev/null && echo "  seek $off OK" || { echo "  seek $off FAIL"; FAIL=1; }
            done

            echo "--- 9. delete + recreate ---"
            rm -f /mnt/mntrs-test/_ci_small.txt 2>/dev/null
            echo "recreated" > /mnt/mntrs-test/_ci_small.txt 2>/dev/null && echo "recreate OK" || { echo "recreate FAIL"; FAIL=1; }
            GOT=$(cat /mnt/mntrs-test/_ci_small.txt 2>/dev/null)
            if [ "$GOT" = "recreated" ]; then echo "recreate verify OK"
            else echo "::error::recreate verify FAIL: got '$GOT'"; FAIL=1; fi

            echo "--- 10. directory create + list + delete ---"
            mkdir -p /mnt/mntrs-test/_ci_dir 2>/dev/null && echo "mkdir OK" || { echo "mkdir FAIL"; FAIL=1; }
            echo "dirfile" > /mnt/mntrs-test/_ci_dir/file.txt 2>/dev/null
            GOT=$(ls /mnt/mntrs-test/_ci_dir/ 2>/dev/null)
            if [ "$GOT" = "file.txt" ]; then echo "dir list OK"
            else echo "::error::dir list FAIL: got '$GOT'"; FAIL=1; fi
            rm -rf /mnt/mntrs-test/_ci_dir 2>/dev/null && echo "rmdir OK" || { echo "rmdir FAIL"; FAIL=1; }

            echo "--- 11. cleanup ---"
            rm -f /mnt/mntrs-test/_ci_small.txt /mnt/mntrs-test/_ci_10m.bin 2>/dev/null || true

            if [ $FAIL -eq 0 ]; then
              echo "✅ ${{ matrix.backend.name }} mount OK"
            else
              echo "::error::${{ matrix.backend.name }} mount tests FAILED"
              exit 1
            fi
          else
            echo "::error::${{ matrix.backend.name }} mount failed: not in mount table"
            mount | grep mntrs || true
            exit 1
          fi

      # HDFS diagnostic dump — runs on success OR failure (always()),
      # BEFORE Cleanup so the container still exists. Bundles the
      # full container log, dfsadmin -report, host-side port listings,
      # the docker inspect metadata, and a probe of the host's
      # 127.0.0.1:<port> reachability so post-mortem has a single
      # artifact to grep instead of re-running.
      - name: Collect HDFS diagnostics
        if: matrix.backend.name == 'hdfs' && always()
        run: |
          DIAG=/tmp/hdfs-diag
          mkdir -p "${DIAG}"
          # docker logs (full, with timestamps). Use --details to
          # preserve stream identifiers (stdout vs stderr) which
          # helps tell entrypoint from s6 service output.
          docker logs --details --timestamps hdfs > "${DIAG}/docker-logs.txt" 2>&1 || true
          # dfsadmin -report — full output (head -200 to bound size;
          # a healthy single-DN cluster is <50 lines).
          docker exec -u hdfs hdfs /opt/hadoop/bin/hdfs dfsadmin -report > "${DIAG}/dfsadmin-report.txt" 2>&1 || true
          # NameNode + DataNode RPC endpoints (sanity: are they
          # actually listening?).
          docker exec hdfs bash -c 'echo "--- namenode rpc ---"; ss -ltnp 2>/dev/null | grep -E ":(8020|9866|9864|9867) " || true; echo "--- datanode rpc ---"; ss -ltn 2>/dev/null | grep -E ":(8020|9866|9864|9867) " || true' > "${DIAG}/ss.txt" 2>&1 || true
          # Container inspect — network mode, port bindings, env
          # (HDFS_HOSTNAME etc.), and image digest for cross-run
          # correlation.
          docker inspect hdfs > "${DIAG}/docker-inspect.json" 2>&1 || true
          # Host-side reachability probe — does the GHA runner's
          # 127.0.0.1 actually accept TCP on the HDFS ports? This
          # distinguishes "DN not bound" (connect refused) from
          # "docker proxy reset" (TCP RST) from "bind ok, client
          # mismatch" (bind ok).
          for p in 8020 9866 9864 9867; do
            {
              echo "--- 127.0.0.1:${p} ---"
              timeout 3 bash -c "exec 3<>/dev/tcp/127.0.0.1/${p} && echo OK || echo FAIL"
            } >> "${DIAG}/host-loopback-probe.txt" 2>&1 || true
          done
          # Mount log + previously-uploaded dfsadmin report
          # (cross-reference).
          cp /tmp/mntrs-mount-hdfs.log "${DIAG}/" 2>/dev/null || true
          cp /tmp/hdfs-dfsadmin-report.txt "${DIAG}/" 2>/dev/null || true
          ls -la "${DIAG}"
        # Upload to a stable artifact name; overwrite is fine since
        # only one hdfs job runs per matrix at a time.
        # NOTE: must use a separate step with upload-artifact@v4 —
        # combining the dump script and the upload into one step
        # doesn't work because run: doesn't accept uses:.

      - name: Upload HDFS diagnostics
        if: matrix.backend.name == 'hdfs' && always()
        uses: actions/upload-artifact@v4
        with:
          name: hdfs-diag-${{ matrix.backend.name }}
          path: /tmp/hdfs-diag
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          if mount | grep -q /mnt/mntrs-test; then
            sudo fusermount3 -u /mnt/mntrs-test
          fi
          docker rm -f hdfs 2>/dev/null || true

      # Per SESSION_PITFALLS §2.6: CI green ≠ tests pass; on failure, preserve
      # the mount log and HDFS dfsadmin report for post-mortem. Pattern adapted
      # from bench.yml ("Upload rclone log" + "actions/upload-artifact@v4").
      - name: Upload mount log (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mount-log-${{ matrix.backend.name }}
          path: /tmp/mntrs-mount-${{ matrix.backend.name }}.log
          if-no-files-found: warn

      - name: Upload HDFS dfsadmin report (failure, hdfs only)
        if: failure() && matrix.backend.name == 'hdfs'
        uses: actions/upload-artifact@v4
        with:
          name: hdfs-dfsadmin-report
          path: /tmp/hdfs-dfsadmin-report.txt
          if-no-files-found: warn


  hdfs-kerberos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: bash tests/e2e/common/install-linux-deps.sh standard "krb5-user" no no

      - name: Start HDFS container
        env:
          HDFS_HOSTNAME: hdfs.test
        run: |
          # Use the public dyrnq/hdfs:latest-debian image in kerberos mode
          # (default — no HADOOP_SECURITY_AUTHENTICATION=simple). The
          # entrypoint renders in-tree config from HDFS_HOSTNAME, starts
          # krb5kdc → kadmind → namenode → datanode, and bootstraps the
          # KDC database + principals + keytab on first run.
          # Principal: hdfs/hdfs.test@TEST.LOCAL
          # Keytab: /etc/hadoop/hdfs.keytab (user hdfs)
          # krb5.conf: realm=TEST.LOCAL, kdc=localhost:88
          # No inline config mounts needed — the in-tree templates carry
          # the same kerberos settings the old HA nameservice config did.
          set -x
          docker run -d --name hdfs --hostname "$HDFS_HOSTNAME" \
            -e HDFS_HOSTNAME="$HDFS_HOSTNAME" \
            -p 8020:8020 -p 88:88 -p 749:749 -p 9866:9866 -p 9864:9864 \
            dyrnq/hdfs:latest-debian

          echo "=== Wait for KDC port 88 ==="
          for i in $(seq 1 30); do
            echo "  kdc attempt $i..."
            if docker exec hdfs bash -c 'echo > /dev/tcp/127.0.0.1/88' 2>/dev/null; then
              echo "KDC port 88 up after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::KDC port 88 never came up"
              docker logs hdfs 2>&1 | tail -40
              exit 1
            fi
            sleep 2
          done

          echo "=== Wait for NameNode + DataNode (kinit retry inside loop) ==="
          # kinit as user hdfs with the in-tree keytab (/etc/hadoop/hdfs.keytab).
          KINITED=0
          for i in $(seq 1 20); do
            echo "  attempt $i..."
            if docker exec -u hdfs hdfs /usr/bin/kinit -kt /etc/hadoop/hdfs.keytab hdfs/${HDFS_HOSTNAME}@TEST.LOCAL 2>/dev/null; then
              KINITED=1
            fi
            if [ $KINITED -eq 1 ] \
               && docker exec -u hdfs hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1 | grep -q "Live datanodes"; then
              echo "HDFS ready (kinit took attempt $i)"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "::error::HDFS did not become ready after 20 attempts (kinit_ok=$KINITED)"
              docker exec -u hdfs hdfs /usr/bin/kinit -kt /etc/hadoop/hdfs.keytab hdfs/${HDFS_HOSTNAME}@TEST.LOCAL 2>&1
              docker exec hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1
              docker logs hdfs 2>&1 | tail -30
              exit 1
            fi
            sleep 5
          done

          echo "=== Container status ==="
          docker logs hdfs 2>&1 | tail -10
          docker exec hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>&1 | head -10

          echo "=== Extracting Kerberos config ==="
          docker cp hdfs:/etc/hadoop/hdfs.keytab /tmp/hdfs.keytab
          docker cp hdfs:/etc/krb5.conf /tmp/krb5.conf
          # hdfs.test must point to 127.0.0.1 because docker's port forward
          # exposes the container's ports on the host's loopback. The image's
          # krb5.conf has kdc=localhost:88 and admin_server=localhost:749;
          # those ports are published (-p 88:88 -p 749:749), so localhost
          # from the host reaches the container's KDC via the port forward.
          # No separate kdc alias or nameservice entry is needed — the new
          # image runs in single-namenode (non-HA) mode.
          echo "127.0.0.1 hdfs.test" | sudo tee -a /etc/hosts
          docker cp hdfs:/opt/hadoop/etc/hadoop/core-site.xml /tmp/core-site.xml
          docker cp hdfs:/opt/hadoop/etc/hadoop/hdfs-site.xml /tmp/hdfs-site.xml

      - name: Configure Kerberos
        env:
          HDFS_HOSTNAME: hdfs.test
        run: |
          sudo cp /tmp/krb5.conf /etc/krb5.conf
          # The image's krb5.conf already has rdns=false; add the two DNS
          # lookup knobs to avoid blocking on DNS in CI (no external DNS).
          # dns_lookup_kdc/realm=false is safe here because the krb5.conf
          # has explicit kdc=localhost and admin_server=localhost entries.
          sudo sed -i '/^\[libdefaults\]/a\dns_lookup_kdc = false\n\tdns_lookup_realm = false' /etc/krb5.conf
          # kinit with the hdfs principal (superuser). The keytab was
          # extracted from the container's /etc/hadoop/hdfs.keytab.
          kinit -kt /tmp/hdfs.keytab hdfs/${HDFS_HOSTNAME}@TEST.LOCAL
          klist

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Test HDFS Kerberos mount
        env:
          HDFS_HOSTNAME: hdfs.test
        run: |
          set -x
          echo "=== 1. Renew Kerberos ticket (hdfs principal) ==="
          kinit -kt /tmp/hdfs.keytab hdfs/${HDFS_HOSTNAME}@TEST.LOCAL
          klist

          echo "=== 2. Create test data in HDFS ==="
          docker exec -u hdfs hdfs /usr/bin/kinit -kt /etc/hadoop/hdfs.keytab hdfs/${HDFS_HOSTNAME}@TEST.LOCAL
          docker exec -u hdfs hdfs /opt/hadoop/bin/hdfs dfs -mkdir -p /test
          docker exec -u hdfs hdfs /opt/hadoop/bin/hdfs dfs -chmod 777 /test
          echo "hello kerberos hdfs" | docker exec -i -u hdfs hdfs /opt/hadoop/bin/hdfs dfs -put - /test/hello.txt
          docker exec -u hdfs hdfs /opt/hadoop/bin/hdfs dfs -chmod 644 /test/hello.txt
          docker exec -u hdfs hdfs /opt/hadoop/bin/hdfs dfs -ls /test/

          echo "=== 3. Export Hadoop config for OpenDAL native HDFS backend ==="
          mkdir -p /tmp/hadoop-conf
          cp /tmp/core-site.xml /tmp/hadoop-conf/
          cp /tmp/hdfs-site.xml /tmp/hadoop-conf/
          export HADOOP_CONF_DIR=/tmp/hadoop-conf
          ls -la /tmp/hadoop-conf/

          echo "=== 4. Check HDFS connectivity from host ==="
          HDFS_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' hdfs)
          echo "HDFS container IP: $HDFS_IP"
          echo "krb5.conf:"
          cat /etc/krb5.conf
          echo "---"
          echo "/etc/hosts:"
          grep -E 'hdfs\.test' /etc/hosts || echo "(no entries)"

          echo "=== 5. Mount ==="
          sudo mkdir -p /mnt/hdfs && sudo chmod 777 /mnt/hdfs
          MOUNT_LOG="/tmp/mntrs-mount.log"
          KRB5CCNAME=$(klist 2>/dev/null | sed -n 's/^Ticket cache: //p')
          # hdfs-native (libhdfs) needs these to find the kerberos
          # config and the host's ticket cache. Without HADOOP_CONF_DIR
          # it falls back to defaults that don't include the test
          # realm's KDC; without KRB5CCNAME the host process's
          # existing ticket isn't picked up by the daemon child (which
          # has no environment except what we explicitly set). Mount
          # via the hdfs hostname (not localhost) so the GSSAPI
          # service principal matches what the hdfs server registered
          # under at kadmin time.
          HADOOP_CONF_DIR=/tmp/hadoop-conf \
          KRB5_CONFIG=/etc/krb5.conf \
          KRB5CCNAME="${KRB5CCNAME}" \
            MNTRS_DAEMON_LOG="$MOUNT_LOG" \
            ./target/release/mntrs mount hdfs://${HDFS_HOSTNAME}:8020/ /mnt/hdfs \
              --allow-other --daemon --daemon-wait --daemon-timeout=20 \
              --opt dfs.namenode.kerberos.principal=hdfs/${HDFS_HOSTNAME}@TEST.LOCAL \
              > "$MOUNT_LOG" 2>&1 &

          # Readiness probe: wait up to 60s for mount. Use cat (not ls)
          # because hdfs-native list_op trips FUSE readdir EIO on some
          # backends; cat goes through read which is the stable path.
          READY=0
          for i in $(seq 1 60); do
            if mount | grep -q /mnt/hdfs; then
              if cat /mnt/hdfs/test/hello.txt >/dev/null 2>&1; then
                echo "mount ready after ${i}s"
                READY=1
                break
              fi
            fi
            sleep 1
          done

          if [ $READY -eq 0 ]; then
            echo "::error::HDFS Kerberos mount not ready after 60s"
            echo "--- mount stdout/stderr ---"
            cat "$MOUNT_LOG"
            echo "--- mount table ---"
            mount | grep hdfs || echo "(no hdfs mount)"
            echo "--- ps mntrs ---"
            ps aux | grep mntrs | grep -v grep || echo "(no mntrs process)"
            exit 1
          fi

          # Per SESSION_PITFALLS §2.6: CI green ≠ tests pass — track failures explicitly
          FAIL=0
          if mount | grep -q /mnt/hdfs; then
            echo "=== 6. Verify ==="

            echo "--- ls ---"
            ls -laR /mnt/hdfs/ 2>&1

            echo "--- read pre-existing file ---"
            GOT=$(cat /mnt/hdfs/test/hello.txt 2>/dev/null)
            if [ "$GOT" = "hello kerberos hdfs" ]; then
              echo "read pre-existing OK: test/hello.txt"
            else
              echo "::error::read pre-existing FAIL: test/hello.txt (got '$GOT')"
              FAIL=1
            fi

            echo "--- write small file ---"
            echo "hello kerberos" > /mnt/hdfs/_ci_small.txt 2>/dev/null && echo "write OK" || { echo "write FAIL"; FAIL=1; }

            echo "--- read back ---"
            GOT=$(cat /mnt/hdfs/_ci_small.txt 2>/dev/null)
            if [ "$GOT" = "hello kerberos" ]; then echo "read back OK"
            else echo "read back FAIL: got '$GOT'"; FAIL=1; fi

            echo "--- append ---"
            echo "more" >> /mnt/hdfs/_ci_small.txt 2>/dev/null && echo "append OK" || { echo "append FAIL"; FAIL=1; }
            GOT=$(cat /mnt/hdfs/_ci_small.txt 2>/dev/null)
            EXPECTED=$(printf "hello kerberos\nmore")
            if [ "$GOT" = "$EXPECTED" ]; then echo "append verify OK"
            else echo "::error::append verify FAIL: got '$GOT'"; FAIL=1; fi

            echo "--- append to pre-existing file ---"
            echo "appended" >> /mnt/hdfs/test/hello.txt 2>/dev/null && echo "append pre-existing OK" || { echo "append pre-existing FAIL"; FAIL=1; }
            GOT=$(cat /mnt/hdfs/test/hello.txt 2>/dev/null)
            if echo "$GOT" | grep -q "appended"; then echo "append pre-existing verify OK"
            else echo "::error::append pre-existing verify FAIL: got '$GOT'"; FAIL=1; fi

            echo "--- write+read 10M sequential ---"
            dd if=/dev/urandom of=/mnt/hdfs/_ci_10m.bin bs=1M count=10 2>/dev/null && echo "write 10M OK" || { echo "write 10M FAIL"; FAIL=1; }
            dd if=/mnt/hdfs/_ci_10m.bin of=/dev/null bs=64K 2>/dev/null && echo "read 10M OK" || { echo "read 10M FAIL"; FAIL=1; }

            echo "--- random seek read ---"
            for off in 0 500 10000 50000 500000 5000000 9000000 9999999; do
              dd if=/mnt/hdfs/_ci_10m.bin bs=1 count=1 skip=$off of=/dev/null 2>/dev/null && echo "  seek $off OK" || { echo "  seek $off FAIL"; FAIL=1; }
            done

            echo "--- delete + recreate ---"
            rm -f /mnt/hdfs/_ci_small.txt 2>/dev/null
            echo "recreated" > /mnt/hdfs/_ci_small.txt 2>/dev/null && echo "recreate OK" || { echo "recreate FAIL"; FAIL=1; }
            GOT=$(cat /mnt/hdfs/_ci_small.txt 2>/dev/null)
            if [ "$GOT" = "recreated" ]; then echo "recreate verify OK"
            else echo "::error::recreate verify FAIL: got '$GOT'"; FAIL=1; fi

            echo "--- directory create + list + delete ---"
            mkdir -p /mnt/hdfs/_ci_dir 2>/dev/null && echo "mkdir OK" || { echo "mkdir FAIL"; FAIL=1; }
            echo "dirfile" > /mnt/hdfs/_ci_dir/file.txt 2>/dev/null
            GOT=$(ls /mnt/hdfs/_ci_dir/ 2>/dev/null)
            if [ "$GOT" = "file.txt" ]; then echo "dir list OK"
            else echo "::error::dir list FAIL: got '$GOT'"; FAIL=1; fi
            rm -rf /mnt/hdfs/_ci_dir 2>/dev/null && echo "rmdir OK" || { echo "rmdir FAIL"; FAIL=1; }

            echo "--- cleanup ---"
            rm -f /mnt/hdfs/_ci_small.txt /mnt/hdfs/_ci_10m.bin 2>/dev/null || true

            if [ $FAIL -eq 0 ]; then
              echo "✅ HDFS Kerberos mount OK"
            else
              echo "::error::HDFS Kerberos mount tests FAILED"
              exit 1
            fi
          else
            echo "::error::HDFS Kerberos mount failed"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          fusermount3 -uz /mnt/hdfs 2>/dev/null
          docker rm -f hdfs 2>/dev/null

      # Per SESSION_PITFALLS §2.6: preserve post-mortem on failure.
      # Pattern adapted from bench.yml ("Upload rclone log" + actions/upload-artifact@v4).
      - name: Upload mount log (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mount-log-hdfs-kerberos
          path: /tmp/mntrs-mount.log
          if-no-files-found: warn

  # Stress loop on the memory backend — surfaces flakes that
  # single-run tests miss. The memory backend has no remote
  # state, so a flake here is purely an mntrs-side bug. The
  # script runs 50 iterations of the 11 sub-tests + rename.
  memory-stress-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: bash tests/e2e/common/install-linux-deps.sh standard "" no no

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Run 50-iteration stress loop
        run: |
          chmod +x ./tests/e2e/mount/stress_loop.sh
          STRESS_LOG=/tmp/mntrs-stress-loop.log
          ./tests/e2e/mount/stress_loop.sh 50 > "$STRESS_LOG" 2>&1

      - name: Upload stress log (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stress-loop-log
          path: /tmp/mntrs-stress-loop.log
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          fusermount3 -uz /tmp/mntrs-test 2>/dev/null || fusermount -uz /tmp/mntrs-test 2>/dev/null || true
          pkill -9 -f "target/release/mntrs mount" 2>/dev/null || true

  # Mount/unmount lifecycle stress — catches process leaks, FD leaks,
  # session.join() regressions, and signal handling issues.
  lifecycle-stress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: bash tests/e2e/common/install-linux-deps.sh standard "" no no

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Lifecycle stress (memory, 50 iterations)
        run: |
          chmod +x ./tests/e2e/mount/lifecycle_stress.sh
          LIFECYCLE_LOG=/tmp/mntrs-lifecycle-stress.log
          ./tests/e2e/mount/lifecycle_stress.sh 50 target/release/mntrs /tmp/mntrs-lifecycle > "$LIFECYCLE_LOG" 2>&1

      - name: Upload lifecycle stress log (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-stress-log
          path: /tmp/mntrs-lifecycle-stress.log
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          fusermount3 -uz /tmp/mntrs-lifecycle 2>/dev/null || true
          pkill -9 -f "target/release/mntrs mount.*lifecycle" 2>/dev/null || true

  # S3 lifecycle stress + writeback crash recovery — verifies
  # mount/unmount cleanup and dirty-cache recovery against real S3.
  s3-lifecycle-stress:
    runs-on: ubuntu-latest
    services:
      minio:
        image: minio/minio:latest
        command: server /data
        options: --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1" --health-interval 5s
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: bash tests/e2e/common/install-linux-deps.sh standard "" no yes

      - name: Install mc (MinIO client)
        run: go install github.com/minio/mc@latest

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Create S3 bucket
        run: |
          mc alias set ci http://localhost:9000 minioadmin minioadmin
          mc mb ci/ci-lifecycle-test 2>/dev/null || true

      - name: S3 lifecycle stress (30 iterations)
        run: |
          chmod +x ./tests/e2e/mount/lifecycle_stress.sh
          export LIFECYCLE_S3_URL="s3://ci-lifecycle-test"
          export LIFECYCLE_S3_OPTS="--opt endpoint=http://localhost:9000 --opt access-key=minioadmin --opt secret-key=minioadmin --opt region=us-east-1"
          S3_LIFECYCLE_LOG=/tmp/mntrs-s3-lifecycle-stress.log
          ./tests/e2e/mount/lifecycle_stress.sh 30 target/release/mntrs /tmp/mntrs-s3-lifecycle > "$S3_LIFECYCLE_LOG" 2>&1

      - name: Writeback crash recovery
        run: |
          chmod +x ./tests/e2e/mount/writeback_recovery.sh
          export WB_S3_ENDPOINT="http://localhost:9000"
          export WB_S3_ACCESS="minioadmin"
          export WB_S3_SECRET="minioadmin"
          WB_RECOVERY_LOG=/tmp/mntrs-writeback-recovery.log
          ./tests/e2e/mount/writeback_recovery.sh target/release/mntrs /tmp/mntrs-wb-cache > "$WB_RECOVERY_LOG" 2>&1

      - name: Upload s3 lifecycle + writeback logs (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: s3-lifecycle-stress-log
          path: |
            /tmp/mntrs-s3-lifecycle-stress.log
            /tmp/mntrs-writeback-recovery.log
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          fusermount3 -uz /tmp/mntrs-s3-lifecycle 2>/dev/null || true
          fusermount3 -uz /tmp/mntrs-wb-recovery 2>/dev/null || true
          pkill -9 -f "target/release/mntrs mount" 2>/dev/null || true
