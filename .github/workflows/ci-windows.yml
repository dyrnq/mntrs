name: CI - Windows


permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install WinFSP + protoc
        shell: pwsh
        run: choco install -y winfsp protoc

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        shell: bash
        run: cargo clippy --package mntrs --lib --bins -- -D warnings 2>&1 || echo "::warning::clippy warnings on Windows (known cfg gaps)"

      - name: Build release
        run: cargo build --release --package mntrs

      - name: Unit tests (lib only, no FUSE)
        run: cargo test --lib --package mntrs

      - name: Smoke test — memory mount + read/write
        run: |
          mkdir C:\mntrs-test 2>$null || $true
          ./target/release/mntrs.exe mount memory:// C:\mntrs-test 2>&1 || echo "::warning::mount failed (WinFSP driver required)"
          if (Test-Path C:\mntrs-test) {
            echo "hello from windows" > C:\mntrs-test\test.txt
            type C:\mntrs-test\test.txt
            dir C:\mntrs-test
            echo "::notice::memory mount read/write ok"
          } else {
            echo "::warning::mount point not found — WinFSP driver required in CI runner"
          }
