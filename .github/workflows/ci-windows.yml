name: CI - Windows

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install WinFSP + protoc
        shell: pwsh
        run: choco install -y winfsp protoc

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        shell: bash
        run: cargo clippy --package mntrs --lib --bins -- -D warnings

      - name: Build release
        run: cargo build --release --package mntrs

      - name: Unit tests (lib only)
        run: cargo test --lib --package mntrs

      - name: Core FS unit tests
        run: cargo test --package mntrs --test core_fs_unit_test

      - name: Platform tests
        run: cargo test --package mntrs --test platform_test

      # FUSE mount test skipped: GitHub Actions Windows runner cannot
      # load kernel drivers. WinFSP requires a system reboot after install.
      # Build + clippy + unit tests still provide good coverage.
      - name: Check WinFSP availability
        run: |
          echo "WinFSP installed but kext not loadable in CI"
          echo "Mount test skipped — requires kernel driver loading"
        shell: bash
