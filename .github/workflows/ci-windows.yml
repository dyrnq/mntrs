name: CI - Windows

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install WinFSP + protoc
        shell: pwsh
        run: choco install -y winfsp protoc

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        shell: bash
        run: cargo clippy --package mntrs --lib --bins -- -D warnings

      - name: Build release
        run: cargo build --release --package mntrs

      - name: Unit tests (lib only)
        run: cargo test --lib --package mntrs

      - name: Smoke test — memory mount + read/write
        run: |
          rm -rf /c/mntrs-test
          mkdir -p /c/mntrs-test
          ./target/release/mntrs.exe mount memory:// C:/mntrs-test
          if ! mount | grep -q /mntrs-test; then echo "ERROR: mount failed"; mount; exit 1; fi
          echo "hello from windows" > /c/mntrs-test/test.txt
          cat /c/mntrs-test/test.txt
          ls -la /c/mntrs-test/
          echo "::notice::memory mount read/write ok"
