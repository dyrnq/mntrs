name: CI - Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # === Windows: build + test + WinFSP ===
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install WinFSP
        shell: pwsh
        run: choco install -y winfsp protoc

      - name: BuildBuild (release)
        run: cargo check -p mntrs-csi

      - name: Test (WinFSP integration)
        shell: pwsh
        env:
          RUST_BACKTRACE: "1"
        run: cargo test -p mntrs-csi
