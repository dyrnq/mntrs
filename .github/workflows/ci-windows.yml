name: CI - Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # === Windows: build + test + WinFSP ===
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install WinFSP
        shell: pwsh
        run: |
          $url = "https://github.com/winfsp/winfsp/releases/download/v2.1/winfsp-2.1.25002.msi"
          $msi = "$env:TEMP\winfsp.msi"
          Invoke-WebRequest -Uri $url -OutFile $msi
          msiexec /i $msi /quiet /norestart
          Start-Sleep -Seconds 5
          Write-Host "WinFSP v2.1 installed"

      - name: BuildBuild (release)
        run: cargo build --release --workspace

      - name: Test (WinFSP integration)
        shell: pwsh
        env:
          RUST_BACKTRACE: "1"
        run: cargo test --workspace --release -- --test-threads=1 --nocapture
