name: CI - Core


permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3 protobuf-compiler
      - name: Build workspace
        run: cargo build --workspace
      - name: Build CSI plugin
        run: cargo build --package mntrs-csi

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3 protobuf-compiler
      - name: Test (all)
        run: cargo test --workspace --lib

  clippy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3 protobuf-compiler
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
