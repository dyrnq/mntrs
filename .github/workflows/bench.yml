name: Benchmark

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

jobs:

  bench:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode:
          - name: fuse-integration
          - name: bench-comparison

    services:
      minio:
        image: minio/minio:latest
        command: server /data
        options: --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1" --health-interval 5s
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev
          sudo grep -q "^user_allow_other" /etc/fuse.conf || echo "user_allow_other" | sudo tee -a /etc/fuse.conf

      - name: Build mntrs (debug, for fuse test)
        run: cargo build

      - name: Build mntrs (release, for bench)
        run: cargo build --release

      - name: Setup MinIO bucket
        run: |
          pip3 install awscli
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin aws --endpoint-url http://localhost:9000 --no-verify-ssl s3 mb s3://test-bucket 2>/dev/null || true
          echo "test" > /tmp/hello.txt

      - name: Run FUSE integration tests
        if: matrix.mode.name == 'fuse-integration'
        run: cargo test --test fuse_integration_test -- --test-threads=1 --nocapture

      - name: Setup rclone
        if: matrix.mode.name == 'bench-comparison'
        run: |
          curl -sSL https://downloads.rclone.org/rclone-current-linux-amd64.deb -o rclone.deb
          sudo dpkg -i rclone.deb
          mkdir -p /tmp/rclone-mnt /tmp/mntrs-bench
          rclone config create minio s3 provider Minio env_auth false \
            access_key_id minioadmin secret_access_key minioadmin \
            endpoint http://localhost:9000 region us-east-1

      - name: Run benchmark
        if: matrix.mode.name == 'bench-comparison'
        run: |
          MNTRS_BIN=./target/release/mntrs RCLONE_MNT=/tmp/rclone-mnt MNTRS_MNT=/tmp/mntrs-bench \
            ENDPOINT=http://localhost:9000 BUCKET=bench-bucket \
            ACCESS_KEY=minioadmin SECRET_KEY=minioadmin \
            bash bench/run_all.sh 2>&1 | tee bench-result.txt

      - name: Upload benchmark results
        if: matrix.mode.name == 'bench-comparison'
        uses: actions/upload-artifact@v4
        with:
          name: bench-result
          path: bench-result.txt

      - name: Upload rclone log
        if: matrix.mode.name == 'bench-comparison'
        uses: actions/upload-artifact@v4
        with:
          name: rclone-bench-log
          path: /tmp/rclone-bench.log

      - name: Check regressions
        if: matrix.mode.name == 'bench-comparison'
        run: cat bench-result.txt
