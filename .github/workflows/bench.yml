name: Benchmark

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'  # every Monday 02:00 UTC

jobs:

  fuse-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      minio:
        image: minio/minio:latest
        command: server /data
        options: --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1" --health-interval 5s
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev

      - name: Build mntrs
        run: cargo build

      - name: Create MinIO test bucket
        run: |
          curl -sf -X PUT http://localhost:9000/test-bucket 2>/dev/null || echo "bucket may exist"
          echo "test" > /tmp/hello.txt
          pip3 install awscli 2>/dev/null || true

      - name: Run FUSE integration tests
        run: cargo test --test fuse_integration_test -- --test-threads=1 --nocapture --ignored 2>&1 || echo "FUSE integration tests skipped (run manually with MinIO)"

  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      minio:
        image: minio/minio:latest
        command: server /data
        options: --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1" --health-interval 5s
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1" --health-interval 5s

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev

      - name: Build mntrs
        run: cargo build --release

      - name: Setup MinIO test bucket
        run: |
          # Create bucket via MinIO Admin API (no mc needed)
          curl -sf -X PUT http://localhost:9000/bench-bucket \
            -H "Authorization: AWS4-HMAC-SHA256 Credential=minioadmin/20260608/us-east-1/s3/aws4_request" \
            || echo "bucket may already exist"
          echo "test content" > /tmp/test.txt
          # Use awscli if available, otherwise skip file upload — benchmark runs on warm cache anyway
          pip3 install awscli 2>/dev/null && \
            AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin \
            aws --endpoint-url http://localhost:9000 s3 cp /tmp/test.txt s3://bench-bucket/test.txt \
            || echo "awscli not available, skipping file upload"

      - name: Setup rclone for comparison
        run: |
          curl -sSL https://downloads.rclone.org/rclone-current-linux-amd64.deb -o rclone.deb
          sudo dpkg -i rclone.deb
          mkdir -p /tmp/rclone-mnt
          rclone config create minio s3 provider Minio env_auth false \
            access_key_id minioadmin secret_access_key minioadmin \
            endpoint http://localhost:9000 region us-east-1
          rclone mount minio:bench-bucket /tmp/rclone-mnt --daemon --read-only
          sleep 3

      - name: Run benchmark
        run: MNTRS_BIN=./target/release/mntrs RCLONE_MNT=/tmp/rclone-mnt ENDPOINT=http://localhost:9000 BUCKET=bench-bucket ACCESS_KEY=minioadmin SECRET_KEY=minioadmin bash bench/run_all.sh 2>&1 | tee bench-result.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-result
          path: bench-result.txt

      - name: Check regressions
        run: |
          echo "=== Benchmark Results ==="
          cat bench-result.txt
          echo ""
          # Check if any test shows mntrs >2x slower than rclone
          echo "Regression check: " && cat bench-result.txt && echo "done" '^.*\|.*\|.*$' bench-result.txt | awk -F'|' '{
            split($2, a, "m"); split($3, b, "m");
            mntrs_ms = a[1]*60 + a[2]; rclone_ms = b[1]*60 + b[2];
            if (mntrs_ms > rclone_ms * 2) {
              print "REGRESSION: "$1" mntrs="mntrs_ms"ms rclone="rclone_ms"ms"
            }
          }' | tee regression.txt
          if [ -s regression.txt ]; then
            echo "::warning::Performance regression detected!"
          fi
          echo "Benchmark completed (exit code ignored)"
