name: Benchmark

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

jobs:

  bench:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Issue #151: A/B matrix for mem_cache impl. fuse-integration
      # ignores the mem_cache_impl value (the FUSE tests don't depend
      # on it) so we exclude the `moka` row there to keep CI time
      # at 3 jobs total: fuse-integration, bench-comparison×dashmap,
      # bench-comparison×moka.
      matrix:
        mode: [fuse-integration, bench-comparison]
        mem_cache_impl: [dashmap, moka]
        exclude:
          - mode: fuse-integration
            mem_cache_impl: moka

    services:
      minio:
        image: minio/minio:latest
        command: server /data
        options: --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1" --health-interval 5s
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install FUSE
        run: bash tests/e2e/common/install-linux-deps.sh standard "" no no

      - name: Build mntrs (debug, for fuse test)
        run: cargo build

      - name: Build mntrs (release, for bench)
        run: cargo build --release

      - name: Setup MinIO bucket
        run: |
          . tests/e2e/common/setup-minio-bucket.sh
          # bench uses local /tmp/hello.txt for its FUSE tests, not an
          # S3 seed upload — pass seed_text="" to skip the cp step.
          setup_minio_bucket test-bucket "" "" ""

      - name: Run FUSE integration tests
        if: matrix.mode == 'fuse-integration'
        run: cargo test --test fuse_integration_test -- --test-threads=1 --nocapture

      - name: Setup rclone
        if: matrix.mode == 'bench-comparison'
        run: |
          curl -sSL https://downloads.rclone.org/rclone-current-linux-amd64.deb -o rclone.deb
          sudo dpkg -i rclone.deb
          mkdir -p /tmp/rclone-mnt /tmp/mntrs-bench
          rclone config create minio s3 provider Minio env_auth false \
            access_key_id minioadmin secret_access_key minioadmin \
            endpoint http://localhost:9000 region us-east-1

      # Issue #151: pass mem_cache_impl to bench/run_all.sh so the
      # mount uses the selected impl (`--mem-cache-impl=$MEM_CACHE_IMPL`
      # in run_all.sh:86). A/B matrix above yields two bench-comparison
      # jobs: one per impl. artifact names are suffixed with the impl
      # so they don't collide in the Actions UI.
      - name: Run benchmark
        if: matrix.mode == 'bench-comparison'
        env:
          MEM_CACHE_IMPL: ${{ matrix.mem_cache_impl }}
        run: |
          MNTRS_BIN=./target/release/mntrs RCLONE_MNT=/tmp/rclone-mnt MNTRS_MNT=/tmp/mntrs-bench \
            ENDPOINT=http://localhost:9000 BUCKET=bench-bucket \
            ACCESS_KEY=minioadmin SECRET_KEY=minioadmin \
            bash bench/run_all.sh 2>&1 | tee bench-result.txt

      - name: Upload benchmark results
        if: matrix.mode == 'bench-comparison'
        uses: actions/upload-artifact@v4
        with:
          name: bench-result-${{ matrix.mem_cache_impl }}
          path: bench-result.txt

      - name: Upload rclone log
        if: matrix.mode == 'bench-comparison'
        uses: actions/upload-artifact@v4
        with:
          name: rclone-bench-log-${{ matrix.mem_cache_impl }}
          path: /tmp/rclone-bench.log

      - name: Check regressions
        if: matrix.mode == 'bench-comparison'
        run: |
          # Compare bench-result.txt against bench/baseline.txt. The
          # script reports 2 distinct regression classes:
          #   1. Overall winner count (mntrs vs rclone)
          #   2. Per-test time on critical workloads (cat 100M, random,
          #      concurrent — high-signal for FUSE reentrancy/locking)
          # Threshold 0.20 = 20% regression fails the step. The script
          # is a no-op if the baseline is missing (with a warning),
          # so this step is safe to merge before a baseline exists.
          . tests/e2e/bench/check-regression.sh
          check_regression bench-result.txt bench/baseline.txt 0.20
