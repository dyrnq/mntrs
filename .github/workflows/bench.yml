name: Benchmark

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

jobs:

  bench:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode:
          - name: fuse-integration
            build-flags: ""
            run: cargo test --test fuse_integration_test -- --test-threads=1 --nocapture
            setup-rclone: false
          - name: bench-comparison
            build-flags: "--release"
            run: MNTRS_BIN=./target/release/mntrs RCLONE_MNT=/tmp/rclone-mnt MNTRS_MNT=/tmp/mntrs-bench ENDPOINT=http://localhost:9000 BUCKET=bench-bucket ACCESS_KEY=minioadmin SECRET_KEY=minioadmin bash bench/run_all.sh 2>&1 | tee bench-result.txt
            setup-rclone: true

    services:
      minio:
        image: minio/minio:latest
        command: server /data
        options: --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1" --health-interval 5s
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev

      - name: Build mntrs
        run: cargo build ${{ matrix.mode.build-flags }}

      - name: Setup MinIO bucket
        run: |
          CONTAINER=$(docker ps -q -f ancestor=minio/minio | head -1)
          if [ -n "$CONTAINER" ]; then
            for i in $(seq 1 5); do
              docker exec "$CONTAINER" mc alias set bench http://localhost:9000 minioadmin minioadmin 2>/dev/null && break
              sleep 2
            done
            docker exec "$CONTAINER" mc mb --ignore-existing bench/test-bucket 2>/dev/null
          fi
          echo "test" > /tmp/hello.txt

      - name: Setup rclone (bench only)
        if: matrix.mode.setup-rclone
        run: |
          curl -sSL https://downloads.rclone.org/rclone-current-linux-amd64.deb -o rclone.deb
          sudo dpkg -i rclone.deb
          mkdir -p /tmp/rclone-mnt
          mkdir -p /tmp/mntrs-bench
          rclone config create minio s3 provider Minio env_auth false \
            access_key_id minioadmin secret_access_key minioadmin \
            endpoint http://localhost:9000 region us-east-1

      - name: Run ${{ matrix.mode.name }}
        run: ${{ matrix.mode.run }}

      - name: Upload benchmark results
        if: matrix.mode.name == 'bench-comparison'
        uses: actions/upload-artifact@v4
        with:
          name: bench-result
          path: bench-result.txt

      - name: Check regressions
        if: matrix.mode.name == 'bench-comparison'
        run: |
          echo "=== Benchmark Results ==="
          cat bench-result.txt
