name: CI - HDFS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # === HDFS (libhdfs JNI) ===
  hdfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install Java + HDFS
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libfuse3-dev fuse3 default-jdk
          echo "JAVA_HOME=/usr/lib/jvm/default-java" >> $GITHUB_ENV
          # Find libjvm.so for LD_LIBRARY_PATH (needed by JNI test binaries)
          JVM_LIB=$(find /usr/lib/jvm -name "libjvm.so" 2>/dev/null | head -1)
          if [ -n "$JVM_LIB" ]; then
            JVM_DIR=$(dirname "$JVM_LIB")
            echo "LD_LIBRARY_PATH=$JVM_DIR:\${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          fi

      - name: Build (with hdfs-jni feature)
        run: cargo build --release --features hdfs-jni

      - name: Test (HDFS integration)
        run: cargo test --test hdfs_integration_test --features hdfs-jni

      - name: Clippy
        run: cargo clippy --workspace --all-targets --features hdfs-jni -- -D warnings
