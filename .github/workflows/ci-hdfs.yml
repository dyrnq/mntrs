name: CI - HDFS

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # === HDFS (libhdfs JNI) ===
  hdfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install Java + HDFS
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libfuse3-dev fuse3 default-jdk libhdfs3-dev
          echo "JAVA_HOME=/usr/lib/jvm/default-java" >> $GITHUB_ENV

      - name: Build (with hdfs-jni feature)
        run: cargo build --release --features hdfs-jni

      - name: Test (HDFS integration)
        run: cargo test --test hdfs_integration_test --features hdfs-jni

      - name: Clippy
        run: cargo clippy --workspace --all-targets --features hdfs-jni -- -D warnings
