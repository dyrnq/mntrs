name: HDFS Kerberos Integration

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  build-hdfs-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      image: ghcr.io/${{ github.repository_owner }}/mntrs-hdfs:ci-test-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push HDFS image
        uses: docker/build-push-action@v6
        with:
          context: docker/hdfs
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mntrs-hdfs:ci-test-${{ github.sha }}

  hdfs-kerberos:
    needs: build-hdfs-image
    runs-on: ubuntu-latest
    services:
      kdc:
        image: gcavalcante8808/krb5-server:latest
        env:
          KRB5_REALM: TEST.LOCAL
          KRB5_KDC: kdc
          KRB5_PASS: adminpass
        ports:
          - 88:88
          - 749:749
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y krb5-user libfuse3-dev fuse3 default-jdk

      - name: Configure Kerberos
        run: |
          cat | sudo tee /etc/krb5.conf << 'KRB5'
          [libdefaults]
            default_realm = TEST.LOCAL
            udp_preference_limit = 1
          [realms]
            TEST.LOCAL = {
              kdc = kdc
              admin_server = kdc
            }
          KRB5
          echo "127.0.0.1 kdc" | sudo tee -a /etc/hosts

      - name: Create principals via Docker exec
        run: |
          CONTAINER=$(docker ps -q -f ancestor=gcavalcante8808/krb5-server)
          docker exec "$CONTAINER" kadmin.local -q "addprinc -randkey hdfs/localhost@TEST.LOCAL"
          docker exec "$CONTAINER" kadmin.local -q "addprinc -randkey testuser@TEST.LOCAL"
          docker exec "$CONTAINER" kadmin.local -q "ktadd -k /tmp/hdfs.keytab hdfs/localhost@TEST.LOCAL"
          docker exec "$CONTAINER" kadmin.local -q "ktadd -k /tmp/testuser.keytab testuser@TEST.LOCAL"
          docker cp "$CONTAINER":/tmp/hdfs.keytab /tmp/
          docker cp "$CONTAINER":/tmp/testuser.keytab /tmp/

      # Start the pre-built HDFS Kerberos Docker image (s6-overlay: KDC + NameNode + DataNode).
      # Image is built and pushed to GHCR in the build-hdfs-image job above.
      # Keytab and krb5.conf are mounted from the runner (created by external KDC container).
      - name: Start HDFS container
        run: |
          docker run -d --name hdfs \
            --add-host kdc:127.0.0.1 \
            -v /tmp/hdfs.keytab:/tmp/hdfs.keytab:ro \
            -v /tmp/testuser.keytab:/tmp/testuser.keytab:ro \
            -v /etc/krb5.conf:/etc/krb5.conf:ro \
            -p 8020:8020 \
            ${{ needs.build-hdfs-image.outputs.image }}
          # Wait for NameNode + DataNode
          for i in $(seq 1 15); do
            if docker exec hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>/dev/null | grep -q "Live datanodes"; then
              echo "HDFS ready"
              break
            fi
            sleep 5
          done
          docker logs hdfs 2>&1 | tail -10

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Test HDFS mount
        run: |
          kinit -kt /tmp/testuser.keytab testuser@TEST.LOCAL
          klist

          # Create test data in HDFS before mounting
          docker exec hdfs /opt/hadoop/bin/hdfs dfs -mkdir -p /test
          echo "hello kerberos hdfs" | docker exec -i hdfs /opt/hadoop/bin/hdfs dfs -put - /test/hello.txt
          docker exec hdfs /opt/hadoop/bin/hdfs dfs -cat /test/hello.txt

          # Mount HDFS via mntrs (read-only)
          sudo mkdir -p /mnt/hdfs && sudo chmod 777 /mnt/hdfs
          ./target/release/mntrs mount hdfs://localhost:8020/ /mnt/hdfs \
            --read-only --daemon --daemon-wait --daemon-timeout=15 2>&1
          sleep 3
          if mount | grep -q /mnt/hdfs; then
            ls -la /mnt/hdfs
            cat /mnt/hdfs/test/hello.txt
            echo "::notice::HDFS Kerberos mount OK"
          else
            echo "::error::HDFS mount failed"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          fusermount3 -uz /mnt/hdfs 2>/dev/null
          docker rm -f hdfs 2>/dev/null

  cleanup-image:
    needs: hdfs-kerberos
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete test image from GHCR
        run: |
          # Use gh CLI to delete package version
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token 2>/dev/null || true
          gh api --method DELETE \
            "/orgs/${{ github.repository_owner }}/packages/container/mntrs-hdfs:ci-test-${{ github.sha }}" 2>/dev/null || echo "Image cleanup skipped"
