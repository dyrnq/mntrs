name: HDFS Kerberos Integration


permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  hdfs-kerberos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      kdc:
        image: gcavalcante8808/krb5-server:latest
        env:
          KRB5_REALM: TEST.LOCAL
          KRB5_KDC: kdc
          KRB5_PASS: adminpass
        ports:
          - 88:88
          - 749:749
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y krb5-user libgssapi-krb5-2 libfuse3-dev fuse3 default-jdk openssh-server openssh-client

      - name: Configure Kerberos
        run: |
          cat | sudo tee /etc/krb5.conf << 'KRB5'
          [libdefaults]
            default_realm = TEST.LOCAL
          [realms]
            TEST.LOCAL = {
              kdc = kdc
              admin_server = kdc
            }
          KRB5
          # Add KDC to hosts
          echo "127.0.0.1 kdc" | sudo tee -a /etc/hosts

      - name: Create principals via Docker exec
        run: |
          KDC_CID=$(docker ps -q -f ancestor=gcavalcante8808/krb5-server)
          docker exec $KDC_CID kadmin.local -q "addprinc -randkey hdfs/localhost@TEST.LOCAL"
          docker exec $KDC_CID kadmin.local -q "addprinc -randkey testuser@TEST.LOCAL"
          docker exec $KDC_CID kadmin.local -q "addprinc -randkey HTTP/localhost@TEST.LOCAL"
          docker exec $KDC_CID kadmin.local -q "ktadd -k /tmp/hdfs.keytab hdfs/localhost@TEST.LOCAL"
          docker exec $KDC_CID kadmin.local -q "ktadd -k /tmp/hdfs.keytab HTTP/localhost@TEST.LOCAL"
          docker exec $KDC_CID kadmin.local -q "ktadd -k /tmp/testuser.keytab testuser@TEST.LOCAL"
          docker cp $KDC_CID:/tmp/hdfs.keytab /tmp/
          docker cp $KDC_CID:/tmp/testuser.keytab /tmp/

      - name: kinit + verify
        run: |
          kinit -kt /tmp/testuser.keytab testuser@TEST.LOCAL
          klist

      - name: Build mntrs (with HDFS)
        run: cargo build --release -p mntrs --features hdfs-jni

      - name: Setup Hadoop single-node
        run: |
          HADOOP_VER="3.3.6"
          HADOOP_URL="https://dlcdn.apache.org/hadoop/common/hadoop-${HADOOP_VER}/hadoop-${HADOOP_VER}.tar.gz"
          echo "Downloading Hadoop ${HADOOP_VER}..."
          curl -sL --retry 3 "$HADOOP_URL" -o /tmp/hadoop.tgz || {
            echo "::warning::Apache CDN failed, trying mirror..."
            curl -sL --retry 3 "https://archive.apache.org/dist/hadoop/common/hadoop-${HADOOP_VER}/hadoop-${HADOOP_VER}.tar.gz" -o /tmp/hadoop.tgz
          }
          sudo tar xzf /tmp/hadoop.tgz -C /opt/
          sudo ln -sf /opt/hadoop-${HADOOP_VER} /opt/hadoop 2>/dev/null || true
          echo "HADOOP_HOME=/opt/hadoop" >> $GITHUB_ENV
          echo "/opt/hadoop/bin" >> $GITHUB_PATH
          # Configure pseudo-distributed mode
          sudo tee /opt/hadoop/etc/hadoop/core-site.xml > /dev/null << XML
          <configuration>
            <property><name>fs.defaultFS</name><value>hdfs://localhost:9000</value></property>
            <property><name>hadoop.security.authentication</name><value>kerberos</value></property>
            <property><name>hadoop.security.authorization</name><value>true</value></property>
            <property><name>hadoop.security.auth_to_local</name><value>DEFAULT</value></property>
          </configuration>
          XML
          sudo tee /opt/hadoop/etc/hadoop/hdfs-site.xml > /dev/null << XML
          <configuration>
            <property><name>dfs.replication</name><value>1</value></property>
            <property><name>dfs.namenode.kerberos.principal</name><value>hdfs/localhost@TEST.LOCAL</value></property>
            <property><name>dfs.datanode.kerberos.principal</name><value>hdfs/localhost@TEST.LOCAL</value></property>
            <property><name>dfs.web.authentication.kerberos.principal</name><value>HTTP/localhost@TEST.LOCAL</value></property>
          </configuration>
          XML
          sudo cp /tmp/hdfs.keytab /opt/hadoop/etc/hadoop/hdfs.keytab
          sudo chmod 600 /opt/hadoop/etc/hadoop/hdfs.keytab
          # Ensure JAVA_HOME is set for Hadoop
          echo "export JAVA_HOME=$(readlink -f /usr/bin/java | sed s:/bin/java::)" | sudo tee -a /opt/hadoop/etc/hadoop/hadoop-env.sh > /dev/null
          echo "export HADOOP_OPTS=-Djava.security.krb5.conf=/etc/krb5.conf" | sudo tee -a /opt/hadoop/etc/hadoop/hadoop-env.sh > /dev/null
          # Setup passwordless SSH for localhost
          ssh-keygen -t rsa -P "" -f ~/.ssh/id_rsa 2>/dev/null
          cat ~/.ssh/id_rsa.pub >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          ssh-keyscan -H localhost >> ~/.ssh/known_hosts 2>/dev/null
          # Format Namenode
          /opt/hadoop/bin/hdfs namenode -format -force 2>&1 | tail -1
          # Start HDFS with Kerberos
          export HADOOP_OPTS="-Djava.security.krb5.conf=/etc/krb5.conf"
          kinit -kt /tmp/hdfs.keytab hdfs/localhost@TEST.LOCAL
          /opt/hadoop/sbin/start-dfs.sh 2>&1
          sleep 5
          # Verify
          /opt/hadoop/bin/hdfs dfsadmin -report 2>&1 | head -5
          HDFS_NAMENODE_ADDR="localhost:9000"
          echo "HDFS_NAMENODE_ADDR=localhost:9000" >> $GITHUB_ENV

      - name: Verify HDFS is running
        run: |
          export HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
          echo "HDFS NameNode: $HDFS_NAMENODE_ADDR"
          /opt/hadoop/bin/hdfs dfs -mkdir -p /test || true
          echo "hello hdfs" | /opt/hadoop/bin/hdfs dfs -put - /test/hello.txt || true
          /opt/hadoop/bin/hdfs dfs -ls /test || true

      - name: Test mntrs HDFS mount
        run: |
          mkdir -p /mnt/hdfs
          ./target/release/mntrs mount "hdfs://$HDFS_NAMENODE_ADDR" /mnt/hdfs \
            --read-only --daemon --daemon-wait --daemon-timeout=15 2>&1 || echo "::warning::HDFS mount failed (check if mntrs has hdfs feature)"
          sleep 2
          ls -la /mnt/hdfs 2>&1 || echo "::warning::mount not ready"
          if [ -d /mnt/hdfs/test ]; then
            cat /mnt/hdfs/test/hello.txt
            echo "::notice::HDFS mount + read OK"
          else
            echo "::warning::HDFS mount verification skipped"
          fi
