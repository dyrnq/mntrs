name: HDFS Kerberos Integration


permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  hdfs-kerberos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      kdc:
        image: gcavalcante8808/krb5-server:latest
        env:
          KRB5_REALM: TEST.LOCAL
          KRB5_KDC: kdc
          KRB5_PASS: adminpass
        ports:
          - 88:88
          - 749:749
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y krb5-user libgssapi-krb5-2 libfuse3-dev fuse3 default-jdk

      - name: Configure Kerberos
        run: |
          cat | sudo tee /etc/krb5.conf << 'KRB5'
          [libdefaults]
            default_realm = TEST.LOCAL
          [realms]
            TEST.LOCAL = {
              kdc = kdc
              admin_server = kdc
            }
          KRB5
          # Add KDC to hosts
          echo "127.0.0.1 kdc" | sudo tee -a /etc/hosts

      - name: Create principals via Docker exec
        run: |
          docker exec $(docker ps -q -f ancestor=gcavalcante8808/krb5-server) kadmin.local -q "addprinc -randkey hdfs/kdc@TEST.LOCAL"
          docker exec $(docker ps -q -f ancestor=gcavalcante8808/krb5-server) kadmin.local -q "addprinc -randkey testuser@TEST.LOCAL"
          docker exec $(docker ps -q -f ancestor=gcavalcante8808/krb5-server) kadmin.local -q "ktadd -k /tmp/hdfs.keytab hdfs/kdc@TEST.LOCAL"
          docker exec $(docker ps -q -f ancestor=gcavalcante8808/krb5-server) kadmin.local -q "ktadd -k /tmp/testuser.keytab testuser@TEST.LOCAL"
          docker cp $(docker ps -q -f ancestor=gcavalcante8808/krb5-server):/tmp/hdfs.keytab /tmp/
          docker cp $(docker ps -q -f ancestor=gcavalcante8808/krb5-server):/tmp/testuser.keytab /tmp/

      - name: kinit + verify
        run: |
          kinit -kt /tmp/testuser.keytab testuser@TEST.LOCAL
          klist

      - name: Build mntrs (with HDFS)
        run: cargo build --release -p mntrs --features hdfs-jni

      - name: Setup HDFS (single-node)
        uses: beyondstorage/setup-hdfs@master
        with:
          hdfs-version: "3.3.1"

      - name: Verify HDFS is running
        run: |
          echo "HDFS NameNode: $HDFS_NAMENODE_ADDR"
          curl -sf "$HDFS_NAMENODE_ADDR" || echo "HDFS web UI not reachable (OK)"
          # Create test dir via HDFS CLI
          hdfs dfs -mkdir -p /test || true
          echo "hello hdfs" | hdfs dfs -put - /test/hello.txt || true
          hdfs dfs -ls /test || true

      - name: Test mntrs HDFS mount
        run: |
          mkdir -p /mnt/hdfs
          ./target/release/mntrs mount "hdfs://$HDFS_NAMENODE_ADDR" /mnt/hdfs \
            --read-only --daemon --daemon-wait --daemon-timeout=15 2>&1 || echo "::warning::HDFS mount failed (check if mntrs has hdfs feature)"
          sleep 2
          ls -la /mnt/hdfs 2>&1 || echo "::warning::mount not ready"
          if [ -d /mnt/hdfs/test ]; then
            cat /mnt/hdfs/test/hello.txt
            echo "::notice::HDFS mount + read OK"
          else
            echo "::warning::HDFS mount verification skipped"
          fi
