name: HDFS Kerberos Integration

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  build-hdfs-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      image: ghcr.io/${{ github.repository_owner }}/mntrs-hdfs:ci-test-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push HDFS image
        uses: docker/build-push-action@v6
        with:
          context: docker/hdfs
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mntrs-hdfs:ci-test-${{ github.sha }}

  hdfs-kerberos:
    needs: build-hdfs-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y krb5-user libfuse3-dev fuse3

      # HDFS image has its own KDC (krb5-kdc), pre-created principals,
      # and keytabs. Just start it, extract keytabs, and configure runner.
      - name: Start HDFS container
        run: |
          docker run -d --name hdfs             -p 8020:8020 -p 88:88 -p 749:749             ${{ needs.build-hdfs-image.outputs.image }}

          # Wait for NameNode + DataNode
          for i in $(seq 1 20); do
            if docker exec hdfs /opt/hadoop/bin/hdfs dfsadmin -report 2>/dev/null | grep -q "Live datanodes"; then
              echo "HDFS ready"
              break
            fi
            echo "Waiting for HDFS... ($i/20)"
            sleep 5
          done
          docker logs hdfs 2>&1 | tail -15

          # Extract keytabs from HDFS image (pre-created during build)
          docker cp hdfs:/tmp/testuser.keytab /tmp/testuser.keytab
          docker cp hdfs:/tmp/hdfs.keytab /tmp/hdfs.keytab
          docker cp hdfs:/etc/krb5.conf /tmp/krb5.conf
          echo "172.17.0.1 kdc" | sudo tee -a /etc/hosts

      - name: Configure Kerberos on runner
        run: |
          sudo cp /tmp/krb5.conf /etc/krb5.conf
          kinit -kt /tmp/testuser.keytab testuser@TEST.LOCAL
          klist

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Test HDFS mount
        run: |
          kinit -kt /tmp/testuser.keytab testuser@TEST.LOCAL
          klist

          # Create test data in HDFS before mounting.
          # The kinit on the runner only provides a ticket for the runner —
          # the HDFS container needs its own kinit with the testuser keytab.
          docker cp /tmp/testuser.keytab hdfs:/tmp/testuser.keytab
          docker exec hdfs /usr/bin/kinit -kt /tmp/testuser.keytab testuser@TEST.LOCAL
          docker exec hdfs /opt/hadoop/bin/hdfs dfs -mkdir -p /test
          echo "hello kerberos hdfs" | docker exec -i hdfs /opt/hadoop/bin/hdfs dfs -put - /test/hello.txt
          docker exec hdfs /opt/hadoop/bin/hdfs dfs -cat /test/hello.txt

          # Mount HDFS via mntrs (read-only)
          sudo mkdir -p /mnt/hdfs && sudo chmod 777 /mnt/hdfs
          ./target/release/mntrs mount hdfs://localhost:8020/ /mnt/hdfs \
            --read-only --daemon --daemon-wait --daemon-timeout=15 2>&1
          sleep 3
          if mount | grep -q /mnt/hdfs; then
            ls -la /mnt/hdfs
            cat /mnt/hdfs/test/hello.txt
            echo "::notice::HDFS Kerberos mount OK"
          else
            echo "::error::HDFS mount failed"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          fusermount3 -uz /mnt/hdfs 2>/dev/null
          docker rm -f hdfs 2>/dev/null

  cleanup-image:
    needs: hdfs-kerberos
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete test image from GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token 2>/dev/null || true
          gh api --method DELETE \
            "/orgs/${{ github.repository_owner }}/packages/container/mntrs-hdfs:ci-test-${{ github.sha }}" 2>/dev/null || echo "Image cleanup skipped"
