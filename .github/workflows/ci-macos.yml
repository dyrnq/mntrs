name: CI - macOS

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install FUSE
        run: brew install macfuse protobuf

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build workspace
        run: cargo build --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit tests (lib only)
        run: cargo test --workspace --lib

      - name: Build release
        run: cargo build --release --package mntrs

      - name: Smoke test — memory mount + read/write
        run: |
          # Verify macFUSE is available
          if ! kextstat | grep -q macfuse && ! [ -c /dev/fuse ]; then
            echo "WARNING: macFUSE kernel extension not loaded, /dev/fuse not found"
            echo "Mount test will fail but this is expected on CI runners"
          fi
          mkdir -p /tmp/mntrs-macos-test
          ./target/release/mntrs mount memory:// /tmp/mntrs-macos-test --volname mntrs-test 2>&1 &
          sleep 5
          if ! mount | grep -q /tmp/mntrs-macos-test; then
            echo "ERROR: mount failed, /tmp/mntrs-macos-test is not a mountpoint"
            mount
            exit 1
          fi
          echo "hello from macos" > /tmp/mntrs-macos-test/test.txt
          cat /tmp/mntrs-macos-test/test.txt
          ls -la /tmp/mntrs-macos-test/
          echo "macOS memory mount read/write OK"
          umount /tmp/mntrs-macos-test
