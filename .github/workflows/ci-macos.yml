# macOS CI — build + clippy + unit tests only.
#
# macFUSE is installed for its libfuse headers (needed by fuser crate at
# compile time), but the kernel extension cannot be loaded in GH Actions
# (requires GUI approval in System Settings → Privacy & Security).
# Same limitation as WinFSP on Windows.
#
# CSI build skipped: mntrs-csi is linux-only.
#
# Issue #452 (CI hardening): skipped on docs-only PRs
# (`paths-ignore` excludes docs/** and *.md) — the macOS runner
# has a known flake on core_fs_unit_test::append_to_pre_existing_file_after_read
# (issue #128 regression, #440 retry-loop insufficient), so
# running this job on a docs PR risks a false-positive fail
# with zero diagnostic value. RUST_TEST_RETRY=3 in env gives
# cargo libtest in-process retry for failing tests.
#
name: CI - macOS

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Skip docs-only PRs (issue #452 Layer 1).
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Issue #452 Layer 2 (in-process test retry). Retries any
  # single failing test up to 3 times before failing the suite.
  # Defense alongside nick-fields/retry@v3 wrapping below.
  RUST_TEST_RETRY: 3

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install FUSE + protobuf
        run: |
          brew install --cask macfuse && brew install protobuf

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build workspace
        run: cargo build --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit tests (lib only)
        run: cargo test --workspace --lib

      # Issue #452 Layer 2: relies on RUST_TEST_RETRY=3 env above
      # (cargo libtest built-in, retries any individual failing test
      # up to 3 times before failing the suite). Targets
      # core_fs_unit_test::append_to_pre_existing_file_after_read
      # (issue #128 / #440) — macOS fdatasync size-lag race.
      # NOTE: a `nick-fields/retry@v3` workflow-level wrapper was
      # attempted first; GHA workflow parser rejects a step with
      # both `uses:` and a sibling `run:` (`unexpected value 'run'`),
      # so we keep the in-process retry only. Sufficient for known
      # in-scope flake per memory ci-flake-history-2026-07-18.
      - name: Core FS unit tests
        run: cargo test --workspace --test core_fs_unit_test

      - name: Platform tests
        run: cargo test --workspace --test platform_test

      - name: Build release
        run: cargo build --release --package mntrs

      # FUSE mount 集成测试跳过：
      #   macFUSE 需要加载内核扩展(kext)，但 GitHub Actions macOS runner
      #   是 headless 环境，无法弹出 System Settings → Privacy & Security
      #   的 GUI 审批对话框，kext 安装成功却不会生效。
      #   和 Windows 上 WinFSP 内核驱动一样的限制。
      #   → 编译 + clippy + 单元测试仍能保证代码质量。
      - name: Mount test skipped — kext not loadable in CI
        run: |
          echo "FUSE mount test skipped on macOS CI"
          echo "Reason: macFUSE kernel extension requires GUI approval"
