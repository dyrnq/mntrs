name: CI - macOS

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install FUSE
        run: brew install --cask fuse-t && brew install protobuf

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build workspace
        run: cargo build --package mntrs

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit tests (lib only)
        run: cargo test --workspace --lib

      - name: Build release
        run: cargo build --release --package mntrs

      - name: Check macFUSE (no mount test — GH Actions lacks kext)
        run: |
          if kextstat 2>/dev/null | grep -q macfuse || [ -c /dev/fuse ]; then
            echo "macFUSE available"
          else
            echo "macFUSE not available — mount test skipped (GH Actions limitation)"
          fi
