name: CI - macOS

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  LIBRARY_PATH: /opt/homebrew/lib

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: |
          brew install --cask fuse-t 2>/dev/null || true
          brew install protobuf
          echo "LIBRARY_PATH=$LIBRARY_PATH"
          ls -la $LIBRARY_PATH/libfuse* 2>/dev/null || echo "libfuse not found in $LIBRARY_PATH"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --package mntrs

      - name: Clippy
        run: cargo clippy --package mntrs --all-targets -- -D warnings

      - name: Unit tests (lib only)
        run: cargo test --package mntrs --lib

      - name: Build release
        run: cargo build --release --package mntrs

      # FUSE mount test: uses fuse-t (kext-less, NFS-backed libfuse).
      # Requires LIBRARY_PATH for Apple Silicon brew path.
      # If mount fails here, check: brew install --cask fuse-t, /opt/homebrew/lib/libfuse.dylib
      - name: Smoke test — memory mount
        run: |
          mkdir -p /tmp/mntrs-macos-test
          ./target/release/mntrs mount memory:// /tmp/mntrs-macos-test --volname mntrs-test 2>&1 &
          sleep 5
          if mount | grep -q /tmp/mntrs-macos-test; then
            echo "hello from macos" > /tmp/mntrs-macos-test/test.txt
            cat /tmp/mntrs-macos-test/test.txt
            ls -la /tmp/mntrs-macos-test/
            echo "macOS memory mount read/write OK"
          else
            echo "::error::mount failed"
            mount
            exit 1
          fi
          umount /tmp/mntrs-macos-test
