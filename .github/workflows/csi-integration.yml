name: CSI Integration Test (k3s + HDFS)

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'

jobs:

  build-csi-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      image: ghcr.io/${{ github.repository_owner }}/mntrs-csi:ci-test-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install musl target
        run: sudo apt-get update && sudo apt-get install -y musl-tools protobuf-compiler && rustup target add x86_64-unknown-linux-musl
      - name: Build mntrs-csi (static musl)
        run: cargo build --release --package mntrs-csi --target x86_64-unknown-linux-musl
      - name: Copy binary to docker context
        run: cp target/x86_64-unknown-linux-musl/release/mntrs-csi docker/csi/
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push CSI image
        uses: docker/build-push-action@v6
        with:
          context: docker/csi
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mntrs-csi:ci-test-${{ github.sha }}

  csi-test:
    needs: [build-csi-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - name: s3
            storage: s3://test-bucket
            endpoint: http://localhost:9000
          - name: hdfs
            storage: hdfs://localhost:8020/
            endpoint: ""
    services:
      minio:
        image: minio/minio:latest
        command: server /data
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install k3s
        run: bash tests/e2e/common/install-k3s.sh 1 ~/.kube/config

      - name: Install FUSE
        run: bash tests/e2e/common/install-linux-deps.sh standard "" yes no

      - name: Build mntrs
        run: cargo build --release -p mntrs

      # ---- S3: create bucket + upload test file ----
      - name: Setup MinIO bucket (s3 only)
        if: matrix.test.name == 's3'
        run: |
          pip3 install awscli
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin \
            aws --endpoint-url http://localhost:9000 --no-verify-ssl s3 mb s3://test-bucket 2>/dev/null || true
          echo "hello s3" > /tmp/s3-test.txt
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin \
            aws --endpoint-url http://localhost:9000 --no-verify-ssl s3 cp /tmp/s3-test.txt s3://test-bucket/

      # ---- HDFS: start container in simple auth mode ----
      # Uses the public dyrnq/hdfs:latest-debian image (source:
      # /data/work/docker-hdfs). Its entrypoint has first-class simple-auth
      # support: HADOOP_SECURITY_AUTHENTICATION=simple strips the krb5kdc +
      # kadmind s6 services and skips the keytab/keystore bootstrap, so the
      # namenode/datanode start without any Kerberos dependency. No in-line
      # config mounts needed — HDFS_HOSTNAME drives the placeholder rendering
      # in the entrypoint (fs.defaultFS, datanode hostname). The repo's
      # docker/hdfs (Kerberos-only) is kept in-tree but no longer built by CI.
      - name: Setup HDFS (hdfs only)
        if: matrix.test.name == 'hdfs'
        run: |
          # --network host: docker bridge + -p 9866:9866 routes the DN data
          # port through docker-proxy, which ConnectionResets the long-lived
          # TCP read of hdfs-native's block_reader (issue #148 symptom:
          # `Failed to connect to DataNode DatanodeIdProto { ip_addr:
          # "127.0.0.1", host_name: "localhost", xfer_port: 9866 }:
          # IOError(Os { code: 104, kind: ConnectionReset })`). Using host
          # network lets the runner reach DN 9866 directly, same as the
          # working mount-tests (HDFS) job in integration.yml. csi-integration
          # run 28109735440 (2026-06-24).
          . tests/e2e/common/start-hdfs-container.sh
          start_hdfs_container simple hdfs localhost
          bash tests/e2e/common/hdfs-prep.sh docker
          echo "hello hdfs" | docker exec -i -u hdfs hdfs /opt/hadoop/bin/hdfs dfs -put - /test/hello.txt

      # ---- Mount + read/write test ----
      - name: Test mntrs mount
        run: |
          sudo mkdir -p /mnt/mntrs-test && sudo chmod 777 /mnt/mntrs-test
          MOUNT_OPTS="--opt endpoint=${{ matrix.test.endpoint }} --opt access-key=minioadmin --opt secret-key=minioadmin --opt region=us-east-1"
          # hdfs backend uses --daemon --daemon-wait (parent exits after spawn);
          # other backends run in foreground.
          MOUNT_LOG="/tmp/mntrs-mount-csi-${{ matrix.test.name }}.log"
          # MNTRS_DAEMON_LOG redirects the daemon child's tracing output to
          # MOUNT_LOG (the parent shell's stdout/stderr alone wouldn't capture
          # it because --daemon --daemon-wait forks a child that holds the
          # FUSE session after the parent exits). Pre-fix this step mounted
          # TWICE (once to /dev/null, once to MOUNT_LOG); the second mount of
          # the same path was rejected by the kernel and surfaced as a
          # spurious fusermount3 /etc/mtab error masking the real hdfs
          # failure (csi-integration run 28102259330, 2026-06-24).
          if [ "${{ matrix.test.name }}" = "hdfs" ]; then
            MNTRS_DAEMON_LOG="$MOUNT_LOG" \
              ./target/release/mntrs mount ${{ matrix.test.storage }} /mnt/mntrs-test $MOUNT_OPTS --allow-other --daemon --daemon-wait --daemon-timeout=20 > "$MOUNT_LOG" 2>&1 &
          else
            ./target/release/mntrs mount ${{ matrix.test.storage }} /mnt/mntrs-test $MOUNT_OPTS > "$MOUNT_LOG" 2>&1 &
          fi

          FAIL=0
          READY=0
          for i in $(seq 1 60); do
            if mount | grep -q /mnt/mntrs-test; then
              if ls /mnt/mntrs-test/ >/dev/null 2>&1; then
                echo "mount ready after ${i}s"
                READY=1
                break
              fi
            fi
            sleep 1
          done

          if [ $READY -eq 0 ]; then
            echo "::error::${{ matrix.test.name }} mount not ready after 60s"
            echo "--- mount log ---"
            cat "$MOUNT_LOG" 2>/dev/null || true
            echo "--- mount table ---"
            mount | grep mntrs-test || echo "(no mount)"
            echo "--- fusermount might be needed ---"
            exit 1
          fi

          if mount | grep -q /mnt/mntrs-test; then
            echo "--- 1. ls ---"
            ls -laR /mnt/mntrs-test/ 2>&1

            echo "--- 2. cat pre-existing files ---"
            case "${{ matrix.test.name }}" in
              s3)
                GOT=$(cat /mnt/mntrs-test/s3-test.txt 2>/dev/null)
                if [ "$GOT" = "hello s3" ]; then echo "read pre-existing OK: s3-test.txt"
                else echo "::error::read pre-existing FAIL: s3-test.txt (got '$GOT')"; FAIL=1; fi
                ;;
              hdfs)
                GOT=$(cat /mnt/mntrs-test/test/hello.txt 2>/dev/null)
                if [ "$GOT" = "hello hdfs" ]; then echo "read pre-existing OK: test/hello.txt"
                else echo "::error::read pre-existing FAIL: test/hello.txt (got '$GOT')"; FAIL=1; fi
                ;;
            esac

            echo "--- 3. write small file ---"
            echo "hello from ${{ matrix.test.name }}" > /mnt/mntrs-test/_ci_small.txt 2>/dev/null && echo "write OK" || { echo "write FAIL"; FAIL=1; }

            echo "--- 4. read back ---"
            GOT=$(cat /mnt/mntrs-test/_ci_small.txt 2>/dev/null)
            if [ "$GOT" = "hello from ${{ matrix.test.name }}" ]; then echo "read back OK"
            else echo "read back FAIL: got '$GOT'"; FAIL=1; fi

            echo "--- 5. append ---"
            echo "more data" >> /mnt/mntrs-test/_ci_small.txt 2>/dev/null && echo "append OK" || { echo "append FAIL"; FAIL=1; }

            echo "--- 6. write+read 10M ---"
            dd if=/dev/urandom of=/mnt/mntrs-test/_ci_10m.bin bs=1M count=10 2>/dev/null && echo "write 10M OK" || { echo "write 10M FAIL"; FAIL=1; }
            dd if=/mnt/mntrs-test/_ci_10m.bin of=/dev/null bs=64K 2>/dev/null && echo "read 10M OK" || { echo "read 10M FAIL"; FAIL=1; }

            echo "--- 7. random read 10M ---"
            for off in 0 500 10000 50000 500000 5000000 9000000 9999999; do
              dd if=/mnt/mntrs-test/_ci_10m.bin bs=1 count=1 skip=$off of=/dev/null 2>/dev/null && echo "  seek $off OK" || { echo "  seek $off FAIL"; FAIL=1; }
            done

            echo "--- 8. cleanup ---"
            rm -f /mnt/mntrs-test/_ci_small.txt /mnt/mntrs-test/_ci_10m.bin 2>/dev/null || true

            if [ $FAIL -eq 0 ]; then
              echo "✅ ${{ matrix.test.name }} mount OK"
            else
              echo "::error::${{ matrix.test.name }} mount tests FAILED"
              exit 1
            fi
          else
            echo "::error::${{ matrix.test.name }} mount failed: not in mount table"
            mount | grep mntrs || true
            exit 1
          fi

      - name: CSI k3s smoke test
        run: |
          kubectl apply -f - << POD
          apiVersion: v1
          kind: Pod
          metadata:
            name: mntrs-csi-test-${{ matrix.test.name }}
          spec:
            containers:
            - name: test
              image: ${{ needs.build-csi-image.outputs.image }}
              command: ["sleep", "infinity"]
          POD
          kubectl wait --for=condition=Ready pod/mntrs-csi-test-${{ matrix.test.name }} --timeout=60s
          kubectl exec mntrs-csi-test-${{ matrix.test.name }} -- /usr/local/bin/mntrs-csi --help 2>&1
          echo "✅ CSI binary smoke test (${{ matrix.test.name }}) passed"

      - name: Cleanup
        if: always()
        run: |
          kubectl delete pod mntrs-csi-test-${{ matrix.test.name }} --ignore-not-found
          if mount | grep -q /mnt/mntrs-test; then
            sudo fusermount3 -u /mnt/mntrs-test
          fi
          docker rm -f hdfs 2>/dev/null || true

      # Per SESSION_PITFALLS §2.6: CI green ≠ tests pass — on failure,
      # preserve the mount log for post-mortem. The mount itself
      # redirected to MOUNT_LOG above (line ~176), and MNTRS_DAEMON_LOG
      # in the daemon branch, so this file holds both the parent
      # shell's stdout/stderr and the daemon's tracing output.
      # Pattern adapted from integration.yml.
      - name: Upload mount log (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mount-log-csi-${{ matrix.test.name }}
          path: /tmp/mntrs-mount-csi-${{ matrix.test.name }}.log
          if-no-files-found: warn

  cleanup-image:
    needs: csi-test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete test image from GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token 2>/dev/null || true
          gh api --method DELETE \
            "/orgs/${{ github.repository_owner }}/packages/container/mntrs-csi/versions" \
            2>/dev/null || echo "Image cleanup skipped"
