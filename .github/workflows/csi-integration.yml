name: CSI Integration Test (k3s + HDFS)

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'

jobs:

  build-csi-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      image: ghcr.io/${{ github.repository_owner }}/mntrs-csi:ci-test-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install musl target
        run: sudo apt-get update && sudo apt-get install -y musl-tools && sudo apt-get update && sudo apt-get install -y musl-tools protobuf-compiler && rustup target add x86_64-unknown-linux-musl
      - name: Build mntrs-csi (static musl)
        run: cargo build --release --package mntrs-csi --target x86_64-unknown-linux-musl
      - name: Copy binary to docker context
        run: cp target/x86_64-unknown-linux-musl/release/mntrs-csi docker/csi/
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push CSI image
        uses: docker/build-push-action@v6
        with:
          context: docker/csi
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mntrs-csi:ci-test-${{ github.sha }}

  csi-test:
    needs: build-csi-image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test:
          - name: s3
            storage: s3://test-bucket
            endpoint: http://localhost:9000
          - name: hdfs
            storage: hdfs://localhost:8020/
            endpoint: ""
    services:
      minio:
        image: minio/minio:latest
        command: server /data
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install k3s + deps
        run: |
          curl -sfL https://get.k3s.io | sh -
          mkdir -p ~/.kube
          sudo k3s kubectl config view --raw > ~/.kube/config
          sudo chown $(id -u):$(id -g) ~/.kube/config
          kubectl wait --for=condition=Ready node --all --timeout=60s
          sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev protobuf-compiler

      - name: Setup HDFS (hdfs test only)
        if: matrix.test.name == 'hdfs'
        run: |
          sudo apt-get install -y default-jdk
          cat > /tmp/hdfs-site.xml << 'XML'
          <?xml version="1.0"?>
          <configuration>
            <property><name>dfs.namenode.name.dir</name><value>/tmp/hdfs/name</value></property>
            <property><name>dfs.datanode.data.dir</name><value>/tmp/hdfs/data</value></property>
            <property><name>dfs.replication</name><value>1</value></property>
            <property><name>dfs.permissions.enabled</name><value>false</value></property>
          </configuration>
          XML
          export HADOOP_CONF_DIR=/tmp
          git clone --depth 1 https://github.com/Kimahriman/hdfs-native.git /tmp/hdfs-native
          cd /tmp/hdfs-native
          cargo build --release --example simple
          target/release/examples/simple &
          sleep 5
          echo "hdfs-native started"

      - name: Build mntrs
        run: cargo build --release -p mntrs

      # Verify FUSE mount via process liveness + mount table.
      # Uses kill -0 (check process alive) and mount | grep (check mount table).
      - name: Setup MinIO bucket (s3 test only)
        if: matrix.test.name == 's3'
        run: |
          pip3 install awscli
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin \
            aws --endpoint-url http://localhost:9000 --no-verify-ssl s3 mb s3://test-bucket 2>/dev/null || true
          echo "hello from minio" > /tmp/s3-test.txt
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin \
            aws --endpoint-url http://localhost:9000 --no-verify-ssl s3 cp /tmp/s3-test.txt s3://test-bucket/

      - name: Test mntrs mount
        run: |
          sudo mkdir -p /mnt/mntrs-test && sudo chmod 777 /mnt/mntrs-test
          timeout 15 ./target/release/mntrs mount ${{ matrix.test.storage }} /mnt/mntrs-test \
            --opt endpoint=${{ matrix.test.endpoint }} \
            --opt access-key=minioadmin \
            --opt secret-key=minioadmin \
            --opt region=us-east-1 \
            --read-only 2>&1 &
          MNTRS_PID=$!
          sleep 5
          if kill -0 $MNTRS_PID 2>/dev/null; then
            if mount | grep -q /mnt/mntrs-test; then
              ls /mnt/mntrs-test/ 2>&1
              cat /mnt/mntrs-test/s3-test.txt 2>&1 && echo "✅ ${{ matrix.test.name }} mount read OK"
            else
              echo "::error::${{ matrix.test.name }} mount failed: mount not in mount table"
              mount | grep mntrs || true
              exit 1
            fi
          else
            echo "::error::${{ matrix.test.name }} mount failed: mntrs process died"
            exit 1
          fi

      - name: CSI k3s smoke test
        run: |
          kubectl apply -f - << POD
          apiVersion: v1
          kind: Pod
          metadata:
            name: mntrs-csi-test-${{ matrix.test.name }}
          spec:
            containers:
            - name: test
              image: ${{ needs.build-csi-image.outputs.image }}
              command: ["sleep", "infinity"]
          POD
          kubectl wait --for=condition=Ready pod/mntrs-csi-test-${{ matrix.test.name }} --timeout=60s
          kubectl exec mntrs-csi-test-${{ matrix.test.name }} -- /usr/local/bin/mntrs-csi --help 2>&1
          echo "✅ CSI binary smoke test (${{ matrix.test.name }}) passed"

      - name: Cleanup
        if: always()
        run: |
          kubectl delete pod mntrs-csi-test-${{ matrix.test.name }} --ignore-not-found
          sudo fusermount3 -u -z /mnt/mntrs-test
          pkill -f "hdfs|simple" 2>/dev/null || true

  cleanup-image:
    needs: csi-test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete test image from GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token 2>/dev/null || true
          gh api --method DELETE \
            "/orgs/${{ github.repository_owner }}/packages/container/mntrs-csi/versions" \
            2>/dev/null || echo "Image cleanup skipped"
