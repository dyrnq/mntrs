name: CSI Integration Test (k3s + HDFS)

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'

jobs:

  csi-k3s-minio:
    runs-on: ubuntu-latest
    services:
      minio:
        image: minio/minio:latest
        command: server /data
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install k3s + deps
        run: |
          curl -sfL https://get.k3s.io | sh -
          mkdir -p ~/.kube
          sudo k3s kubectl config view --raw > ~/.kube/config
          sudo chown $(id -u):$(id -g) ~/.kube/config
          kubectl wait --for=condition=Ready node --all --timeout=60s
          sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev protobuf-compiler

      - name: Build mntrs + CSI
        run: cargo build --release -p mntrs -p mntrs-csi

      - name: Test S3 mount via mntrs
        run: |
          sudo mkdir -p /mnt/s3-test && sudo chmod 777 /mnt/s3-test
          timeout 10 ./target/release/mntrs mount s3://test-bucket /mnt/s3-test \
            --opt endpoint=http://localhost:9000 \
            --opt access-key=minioadmin \
            --opt secret-key=minioadmin \
            --opt region=us-east-1 \
            --read-only 2>&1 &
          sleep 5
          if mountpoint -q /mnt/s3-test; then ls /mnt/s3-test/ 2>&1 && echo "✅ S3 mount works"; else echo "::error::S3 mount not found"; mount; exit 1; fi
          sudo fusermount3 -u /mnt/s3-test

  # Build CSI image and push to GHCR
  build-csi-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build mntrs-csi (static musl)
        run: cargo build --release --package mntrs-csi --target x86_64-unknown-linux-musl

      - name: Copy binary to docker context
        run: cp target/x86_64-unknown-linux-musl/release/mntrs-csi docker/csi/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CSI image
        uses: docker/build-push-action@v6
        with:
          context: docker/csi
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mntrs-csi:ci-test-${{ github.sha }}

  csi-k3s-hdfs:
    needs: build-csi-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install k3s + Java
        run: |
          curl -sfL https://get.k3s.io | sh -
          mkdir -p ~/.kube
          sudo k3s kubectl config view --raw > ~/.kube/config
          sudo chown $(id -u):$(id -g) ~/.kube/config
          kubectl wait --for=condition=Ready node --all --timeout=60s
          sudo apt-get update && sudo apt-get install -y default-jdk fuse3 libfuse3-dev protobuf-compiler

      - name: Build mntrs
        run: cargo build --release -p mntrs

      - name: Start hdfs-native (simple auth)
        run: |
          cat > /tmp/hdfs-site.xml << 'XML'
          <?xml version="1.0"?>
          <configuration>
            <property><name>dfs.namenode.name.dir</name><value>/tmp/hdfs/name</value></property>
            <property><name>dfs.datanode.data.dir</name><value>/tmp/hdfs/data</value></property>
            <property><name>dfs.replication</name><value>1</value></property>
            <property><name>dfs.permissions.enabled</name><value>false</value></property>
          </configuration>
          XML
          export HADOOP_CONF_DIR=/tmp
          git clone --depth 1 https://github.com/Kimahriman/hdfs-native.git /tmp/hdfs-native
          cd /tmp/hdfs-native
          cargo build --release --example simple
          target/release/examples/simple &
          sleep 5
          echo "hdfs-native started"

      - name: Test mntrs HDFS mount (simple auth)
        run: |
          sudo mkdir -p /mnt/hdfs-test && sudo chmod 777 /mnt/hdfs-test
          timeout 10 ./target/release/mntrs mount hdfs://localhost:8020/ /mnt/hdfs-test --read-only 2>&1 &
          sleep 5
          if mountpoint -q /mnt/hdfs-test; then ls /mnt/hdfs-test/ && echo "✅ HDFS mount works"; else echo "::warning::HDFS mount may be empty (fresh cluster)"; fi
          sudo fusermount3 -u /mnt/hdfs-test

      - name: CSI k3s smoke test
        run: |
          kubectl apply -f - << POD
          apiVersion: v1
          kind: Pod
          metadata:
            name: mntrs-csi-test
          spec:
            containers:
            - name: test
              image: ghcr.io/${{ github.repository_owner }}/mntrs-csi:ci-test-${{ github.sha }}
              command: ["sleep", "infinity"]
          POD
          kubectl wait --for=condition=Ready pod/mntrs-csi-test --timeout=60s
          kubectl exec mntrs-csi-test -- /usr/local/bin/mntrs-csi --help 2>&1
          echo "✅ CSI binary smoke test passed"

      - name: Cleanup
        if: always()
        run: |
          kubectl delete pod mntrs-csi-test --ignore-not-found
          sudo fusermount3 -u /mnt/hdfs-test 2>/dev/null
          pkill -f "hdfs|simple" 2>/dev/null

  # Delete GHCR test image after tests
  cleanup-image:
    needs: csi-k3s-hdfs
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete test image from GHCR
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/mntrs-csi:ci-test-${{ github.sha }}"
          echo "Would delete: $IMAGE"
          # GHCR deletion requires API call — use gh CLI or curl with token
          TAG="ci-test-${{ github.sha }}"
          curl -s -X DELETE \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository_owner }}/mntrs/packages/container/mntrs-csi/versions?package_type=container" \
            || echo "Image cleanup skipped (may already be deleted or no permission)"
