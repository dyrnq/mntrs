name: CSI Integration Test (k3s + HDFS)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'

jobs:

  csi-k3s-minio:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      minio:
        image: minio/minio:latest
        command: server /data
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install k3s + deps
        run: |
          curl -sfL https://get.k3s.io | sh -
          mkdir -p ~/.kube
          sudo k3s kubectl config view --raw > ~/.kube/config
          sudo chown $(id -u):$(id -g) ~/.kube/config
          kubectl wait --for=condition=Ready node --all --timeout=60s
          sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev protobuf-compiler

      - name: Build mntrs + CSI
        run: cargo build --release -p mntrs -p mntrs-csi

      - name: Test S3 mount via mntrs
        run: |
          sudo mkdir -p /mnt/s3-test
          timeout 10 ./target/release/mntrs mount s3://test-bucket /mnt/s3-test \
            --opt endpoint=http://localhost:9000 \
            --opt access-key=minioadmin \
            --opt secret-key=minioadmin \
            --opt region=us-east-1 \
            --read-only 2>&1 &
          sleep 5
          # Create a test file
          echo "hello minio" > /tmp/test.txt
          # Verify mount works
          ls /mnt/s3-test/ && echo "✅ S3 mount works" || echo "⚠️  S3 mount empty"
          sudo fusermount3 -u /mnt/s3-test 2>/dev/null || true

  csi-k3s-hdfs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install k3s + Java
        run: |
          curl -sfL https://get.k3s.io | sh -
          mkdir -p ~/.kube
          sudo k3s kubectl config view --raw > ~/.kube/config
          sudo chown $(id -u):$(id -g) ~/.kube/config
          kubectl wait --for=condition=Ready node --all --timeout=60s
          sudo apt-get update && sudo apt-get install -y default-jdk fuse3 libfuse3-dev protobuf-compiler

      - name: Build mntrs + CSI
        run: cargo build --release -p mntrs -p mntrs-csi

      - name: Start MiniDFS (simple auth)
        run: |
          # Start a single-node HDFS in background
          cat > /tmp/hdfs-site.xml << 'XML'
          <?xml version="1.0"?>
          <configuration>
            <property><name>dfs.namenode.name.dir</name><value>/tmp/hdfs/name</value></property>
            <property><name>dfs.datanode.data.dir</name><value>/tmp/hdfs/data</value></property>
            <property><name>dfs.replication</name><value>1</value></property>
            <property><name>dfs.permissions.enabled</name><value>false</value></property>
          </configuration>
          XML
          export HADOOP_CONF_DIR=/tmp
          # Use hdfs binary if available, otherwise skip
          if command -v hdfs &>/dev/null; then
            hdfs namenode -format -force
            hdfs namenode &
            hdfs datanode &
            sleep 5
            echo "HDFS started on localhost:8020"
          else
            echo "hdfs CLI not available, building from hdfs-native test"
            # Build minidfs from hdfs-native crate
            git clone --depth 1 https://github.com/Kimahriman/hdfs-native.git /tmp/hdfs-native
            cd /tmp/hdfs-native
            cargo build --release --example minidfs
            target/release/examples/minidfs &
            sleep 5
            echo "MiniDFS started"
          fi

      - name: Test mntrs HDFS mount (simple auth)
        run: |
          sudo mkdir -p /mnt/hdfs-test
          timeout 10 ./target/release/mntrs mount hdfs://localhost:8020/ /mnt/hdfs-test --read-only 2>&1 &
          sleep 5
          ls /mnt/hdfs-test/ 2>/dev/null && echo "✅ HDFS mount works" || echo "⚠️  HDFS mount may be empty (fresh cluster)"
          sudo fusermount3 -u /mnt/hdfs-test 2>/dev/null || true

      - name: CSI k3s smoke test
        run: |
          kubectl apply -f - << 'POD'
          apiVersion: v1
          kind: Pod
          metadata:
            name: mntrs-csi-test
          spec:
            containers:
            - name: test
              image: ubuntu:22.04
              command: ["sleep", "infinity"]
              volumeMounts:
              - name: binary
                mountPath: /usr/local/bin/mntrs-csi
            volumes:
            - name: binary
              hostPath:
                path: ${{ github.workspace }}/target/release/mntrs-csi
                type: File
          POD
          kubectl wait --for=condition=Ready pod/mntrs-csi-test --timeout=60s
          kubectl exec mntrs-csi-test -- /usr/local/bin/mntrs-csi --help 2>&1 || true
          echo "✅ CSI binary smoke test passed"

      - name: Cleanup
        if: always()
        run: |
          kubectl delete pod mntrs-csi-test --ignore-not-found
          sudo fusermount3 -u /mnt/hdfs-test 2>/dev/null || true
          pkill -f 'hdfs\|minidfs' 2>/dev/null || true
