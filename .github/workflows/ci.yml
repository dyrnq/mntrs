name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Linux: fuser backend
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3
      - name: Check
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Format check
        run: cargo fmt --check
      - name: Test
        run: cargo test --workspace

  # macOS: fuser backend (macFUSE)
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install macFUSE
        run: |
          brew install --cask macfuse
      - name: Check
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test (unit only, no FUSE tests)
        run: cargo test --workspace --lib

  # Windows: winfsp backend
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install WinFSP
        run: |
          # WinFSP installer — download and install silently
          $url = "https://github.com/winfsp/winfsp/releases/download/v2.1/winfsp-2.1.24065.msi"
          $out = "$env:TEMP\winfsp.msi"
          Invoke-WebRequest -Uri $url -OutFile $out
          Start-Process msiexec.exe -Wait -ArgumentList "/i $out /quiet"
      - name: Add winfsp dependency (Windows)
        # winfsp crate is already in Cargo.toml behind [target.'cfg(windows)'.dependencies]
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test (unit only, no WinFSP integration)
        run: cargo test --workspace --lib
