name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Linux: fuser backend
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install FUSE
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3
      - name: Check
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Format check
        run: cargo fmt --check
      - name: Test
        run: cargo test --workspace

  # macOS: fuser backend (macFUSE)
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install macFUSE
        run: |
          brew install --cask macfuse
      - name: Check
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test (unit only, no FUSE tests)
        run: cargo test --workspace --lib

  # Windows: winfsp backend
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install WinFSP
        shell: pwsh
        run: choco install winfsp --version=2.1.24065 -y
      - name: Start WinFSP service
        shell: pwsh
        run: |
          $svc = Get-Service winfsp -ErrorAction SilentlyContinue
          if (-not $svc) {
            Write-Error "winfsp service not found, install failed"
            exit 1
          }
          Set-Service winfsp -StartupType Automatic
          Start-Service winfsp
          Start-Sleep -Seconds 3
          $svc = Get-Service winfsp
          if ($svc.Status -ne 'Running') {
            Write-Error "winfsp service not running: $($svc.Status)"
            exit 1
          }
          Write-Host "WinFSP service is running"
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build (release)
        run: cargo build --release --workspace
      - name: Test (including WinFSP integration)
        shell: pwsh
        env:
          RUST_BACKTRACE: "1"
        run: cargo test --workspace --release -- --test-threads=1 --nocapture
